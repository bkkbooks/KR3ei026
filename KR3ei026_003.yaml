暈速服生化原方以救急也王太僕曰治下補下制以緩急緩則路遠而力微急則味厚而力重故治産當導丹溪而固本服藥宜效太僕以加頻此雖未盡産中之詳不失乎産後之旨按此謂氣血隨胎而去必屬大虛故無論諸證皆當以大補為先其他皆屬可緩言雖近理而未免言之過也故産後氣血俱去誠多虛證然有虛者有不虛者有全實者凡此三者但當隨證隨人辨其實以分治之不得執有成心概行大補以致助邪此辨之不可不真也血塊作痛産後血塊作痛多由産母難産過勞而成或調護失宜或寒邪凝滯以致血停作痛古法每用蘇木三稜莪朮以迅攻之時醫多用歸尾紅花以急行之或延胡牛膝以大破之他如用山楂砂糖以消塊薑椒艾酒以定痛亦非良劑至於治氣脹用烏藥香附以順之枳殼厚朴以順之又有用青皮蘇子以下氣定喘芩連梔柏以退熱除煩彼夫血枯便閉以承氣湯下而愈厥汗多小便澀以五苓散通之而愈祕此皆重虛産母非徒無益反致變證百出蓋産後血塊固宜消新血亦宜生必須行中帶補化中又生可稱善治若生化湯能使血塊消而痛止神清而氣復産後之至寶也凡産兒下地未進飲食之先即服一劑後再連服二劑可保産後一切危證生化湯當歸八錢川芎三錢炙甘草五分炮薑五分夏用四分桃仁十粒去皮尖搗水煎入陳酒六七匙沖服渣另用器儲候三劑頭煎服完將三渣作一劑水煎服産後調治産後百病皆血虛火盛瘀血妄行而已間有內傷飲食外感風寒然必先逐瘀補虛為主若不兼逐瘀但服參耆停滯之劑必有瘀血攻心即死者食內太早亦然故産母但覺小水短少即是病生便須服藥調理脾胃肝腎如不愈者必氣滯且逆蓋婦人凡事多憂思恚怒憂思太過則氣結而血亦結恚怒太過則氣逆而血亦逆甚則乳鞭脅痛要之女病皆因氣血鬱結所以古方多用行氣藥惡露不下産後惡露不下有結聚成塊心胸煩悶臍下堅痛者宜當歸血竭丸有兼受寒熱勞碌腰脊骨煩痛者宜丹參散有寒熱交攻心慌昏沉腹中疼痛者宜通瘀飲又有惡露方下忽然斷絶驟作寒熱臍腹百脈皆痛如錐刺由冷熱不調或思慮動作氣所壅遏血蓄經絡者宜沒藥丸當歸血竭丸當歸血竭蓬朮五靈脂炒上為末米醋糊丸酒服二錢丹參散丹參一味曬乾為末酒服二錢通瘀飲當歸尾大黃各三錢白朮蜜炙木通各一錢紅花五分桃仁三十粒搗如泥水酒各半煎三沸入桃仁泥再煎一沸溫服沒藥丸當歸一兩白芍桂心各五錢桃仁炒去皮尖搗沒藥研各二錢五分虻蟲去翅足炒水蛭炒焦各二十枚上為末醋糊丸梧子大淡醋湯下三丸惡露不止産後惡露不止小便急痛者宜磨塊四物湯或血下過多漸至瘦弱者宜八珍湯去甘草加厚朴黃柏阿膠牡丹皮或下如豆汁紫黑過多者宜加味四物湯或至月餘猶淋瀝不止已為陷下宜增益四物湯或下不止至於數月及半載之久者宜千金方或惡血不絶崩血不可禁腹中絞痛氣急者宜牛角腮丸或惡露淋瀝不斷心悶短氣四肢乏弱頭心昏重五心煩熱面黃體瘦者宜牡蠣散若因血熱者宜清化飲若傷衝任之絡者宜固陰煎加減用之若肝脾氣虛不能收攝者宜補中益氣湯若氣血俱虛而淡血流不已者宜十全大補湯若怒火傷肝而血不藏者宜加減四物湯若風熱在肝而血下泄者宜一味防風散服之神效磨塊四物湯熟地黃當歸白芍川芎延胡索桃仁去皮尖肉桂熟大黃水煎服八珍湯人參白朮蜜炙茯苓炙甘草熟地黃當歸白芍川芎各一錢薑三片棗二枚水煎服加味四物湯熟地黃當歸各三錢白芍二錢川芎蒲黃阿膠炒薊根白芷各一錢水煎服增益四物湯熟地黃當歸各三錢白芍二錢川芎升麻白芷各一錢血餘灰五分另入水煎服千金方升麻二錢酣酒二鍾煮取一鍾分二服牛角腮丸牛角腮酥炙五兩馬蹄殼一個燒生地黃四兩代赭石乾薑各三兩阿膠炒二兩血餘灰一兩即頭髮灰上為末蜜丸白湯下牡蠣散牡蠣粉龍骨川芎生地黃茯苓當歸人參艾葉地榆各一錢炙甘草五分水煎服清化飲白芍麥冬去心各二錢牡丹皮茯苓黃芩生地黃各二三錢石斛一錢水煎食遠服骨蒸多汗加地骨皮一錢五分熱甚而渴頭痛加石膏一二錢下熱便澀加木通一錢或黃柏梔子如兼外邪發熱加柴胡一錢固陰煎人參熟地黃各三錢山藥炒二錢山茱萸一錢五分遠志七分炒炙甘草一錢五味子十四粒菟絲子炒香二錢水煎食遠服陰虛微熱而血不固者加川續斷二錢肝腎血虛小腹痛而血不歸經者加當歸二錢脾虛多濕或兼嘔惡加白朮一錢氣陷不固加升麻炒一錢心虛不眠或多汗者加棗仁炒二錢虛滑遺甚加金櫻子肉二錢或醋炒文蛤一錢補中益氣湯人參黃耆炒白朮蜜炙炙甘草各一錢半當歸一錢陳皮五分升麻柴胡各三分薑三片棗二枚水煎服十全大補湯人參白朮蜜炙黃耆蜜炙熟地黃當歸白芍茯苓川芎各一錢炙甘草肉桂各五分棗二枚薑三片水煎服加減四物湯熟地黃當歸各三錢川芎一錢白芍二錢山梔仁炒柴胡牡丹皮各一錢水煎服一味防風散防風去蘆為末每服一錢白湯調下外感發熱産後有外感發熱者蓋臨盆之際露體用力無暇他顧此時或遇寒邪乘虛而入感之最易若見頭痛身痛憎寒壯熱或腰背拘急脈見緊數外感證也然此外感隨感隨病與正傷寒不同故宜略加解散即痊勿謂新産之後不宜表散但當酌其虛實而分治之如感邪氣不甚虛者宜三柴胡飲若氣虛脾弱者宜四柴胡飲或五柴胡飲若肝脾腎三陰不足者宜補陰益氣煎若虛寒之甚者宜理陰煎若強壯氣實者宜正柴胡飲若兼火盛而邪不解者宜一柴胡飲若風寒俱感表裡俱滯者宜五積散三柴胡飲柴胡二三錢白芍一錢五分炙甘草陳皮各一錢生薑三五片當歸二錢溏泄者易熟地