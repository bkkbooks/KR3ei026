也急用桑白皮一錢煎湯研送桑白皮恐力薄更加桃仁杏仁各一錢作引更妙産後血暈眼目昏黑或寒戰咬牙由敗血流入五臟積於肝中也急用紅花八分煎湯衝入童便一杯研送産後鼻黑及鼻衄氣血散亂諸經虛熱也急用桑白皮一錢煎湯研送加地骨皮茅草根各二錢更妙産後言語不出手足不遂由毛孔開張風寒襲入所致或由敗血衝心者用豆淋酒研送按豆淋酒用黑大豆一合即烏毛豆炒熱滾酒浸半刻去豆用酒産後遍身生瘕因三四日內強力下床致傷産穴或怒氣衝傷五臟初起眼澀口噤者用豆淋酒研送産後三四日起臥不得眼花口乾心亂不省人事者用薄荷少許煎湯衝入童便研送或血氣未定過食熱物致心悶口乾發熱煩滿者用紅花二三分煎湯研送産後腰痛四肢作痛因百脈開張敗血隨氣流行散於四肢初得氣時肚熱腰寒者用鐵稱錘炭火燒紅淬熱酒研藥和入乘熱送服産後中風口開口開一作口閉氣急半身不遂並頭痛寒熱均用童便研送此條與前言語不出手足不遂條相似因有氣急一證故不用豆淋酒惡其升也産後血崩頭痛口乾心神慌亂者用醋炒海螵蛸一錢紫葳花五分煎湯研送或惡露成塊多瘀者改用真紅花五分煎湯研送如血崩已緩而頭痛口乾心亂不瘥者改用生雞子黃一個煎清湯研送雞子黃宜囫圇煎則汁清而不滯産後腹痛難忍按之得緩者用酒水各半煎酒炒白芍一錢研送若按之痛反甚者改用元胡索一錢以酒水各半煎湯研送不飲者酒宜減素有肝氣者用水煎如痛而有塊者照後兩條産後腹中生塊不時作痛常聚不散因房事太早食硬臥冷所致者用當歸一錢酒煎研送並宜接服婦科回生至寶丹此丸杭城大藥肆備之若痛時有塊痛止即散者屬氣分改用青皮五分川楝子一錢水煎研送不用酒煎當歸産後數日內腹中血塊攻痛俗名兒枕痛由於惡露不通或通而甚少者用山楂炭一錢炒枯黑沙糖四錢煎湯衝入童便半杯研送此條當與前兩條參看産後因過食冷物心痛者用茴香真紅花各五分煎湯研送産後黃腫頭疼四肢沉重因食冷物觸動敗血傳入脾胃變化作腫也患者口枯體倦用荊芥槐角棘針真紅花各三分酒煎研送忌魚腥此丸所治以上各證屢試屢驗其效如神但用引不同臨服時必須照本對證細查確切不可大意至要至要
