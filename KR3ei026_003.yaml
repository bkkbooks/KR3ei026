body:
  text: 卷三保産上保産總論生産一事造化自然之理本古今常事而人人認為難事時至自生不必憂疑而人人抱乎憂疑者總由此理未明也造化原不令人難生人多不知調攝因而難生造化原不令人逆生人多慌忙逼迫因而逆生難逆兩端關係二命倘平時不知講求則臨産必至誤事為夫君者宜於平時家中談論令婦女習聞知熟有孕知調護臨産有主張不慌忙無疑懼自無難産之患以受胎後論即不能如古人胎教凡可禁忌者詳見安胎上卷亦宜省悟以臨産時論胎至十月形完氣壯手足必動動則母腹必痛痛急則胞衣必破子自出胎而生若不忍耐順時見其腹痛半日一日不産即謂難生不知是胞衣未破子未出胎若不忍耐催其速生一催之間因多誤事故臨産切不可慌張即一二日三五日無妨總宜安心定氣任其自然娩強忍痛進其飲食要坐則坐要行則行要睡則睡莫聽穩婆逼迫用力太早自己勿求速旁人亦勿多言驚慌恐懼以亂其心時至自然分娩滑胎滑胎之法惟欲其坐草之期易而且速而難易之由則在血之盈虛不在藥之滑利蓋血多則潤而産必易血虧則澀而産必難故未産之前但當培養氣血而預為之地如四物湯滑胎煎五福飲小營煎八珍湯即皆滑胎之要藥若不知此而過用滑利等藥或産期未近無火無滯而妄用清火行氣之劑多致血虧氣陷反為臨期大害若果肥盛氣實者則紫蘇飲保生無憂散皆可擇用四物湯熟地黃當歸各三錢川芎一錢白芍二錢水二鍾煎七分服滑胎煎當歸熟地黃各三錢山藥薑汁炒杜仲炒各二錢枳殼麵炒川芎各七分水煎食前溫服氣體虛弱加人參白朮蜜炙各二錢便實多滯加牛膝一錢五福飲人參隨宜熟地黃隨宜當歸二錢白朮蜜炙炙甘草各一錢水二鍾煎七分食遠溫服小營煎當歸熟地黃白芍山藥薑汁炒枸杞子各二錢炙甘草一錢水煎食遠溫服八珍湯人參白朮蜜炙茯苓熟地黃當歸白芍川芎炙甘草各一錢薑棗為引水煎服紫蘇飲大腹皮川芎白芍陳皮蘇葉當歸各一錢人參炙甘草各五分薑三片水煎服一方有香附無人參保生無憂散當歸川芎白芍乳香去油研枳殼麩炒南木香血餘各等分水煎服催生催生之藥原因婦人難産不得已而用之也若平素易産者時至自生不必服藥如必欲服求其快便須待産婦腹痛必至腰痛已甚方是欲産之候始可用藥順勢推之自當立下若只腹痛未甚兒身尚未欲生切不可早服催生之藥強其速生使兒身不能轉胞則橫生倒産必不免矣是故生無可催也所謂催生者不過助其氣血而利導之耳然必待臨産腹痛已甚方可用脫花煎少加肉桂五七分為最穩最妙或經日久産母困倦難生俱宜服滑胎煎以助其氣血使之速生若氣虛無力艱於傳送者必用獨參湯接濟其力皆為催生要法若期未至而妄用行氣導血之劑以為催生亦猶揠宋人之苗耳脫花煎當歸七八錢或一兩肉桂川芎牛膝各二錢車前子一錢五分水二鍾煎七分溫服氣虛加人參一二錢陰虛加熟地黃三五錢滑胎煎當歸熟地黃各三錢山藥薑汁炒杜仲炒各二錢枳殼麩炒川芎各七分水煎食前溫服氣體弱加人參白朮蜜炙各二錢便實多滯加牛膝一錢獨參湯人參二兩去蘆水煎濃汁乘熱頓服頻頻服之補接氣力産室産室當令溫涼得宜若産在春夏宜避風産在秋冬宜避寒故盛暑不可當風取涼以犯邪又不宜熱甚致令産母頭痛面赤亦不宜多人喧譁驚慌熱氣熏蒸若夏月宜儲涼水一盆溫則換之以解其熱若冬月宜儲炭火一盆務令下體和暖衣被亦宜加厚庶不為寒氣所侵可免胎寒血滯難産之患且産後胎元即落氣血俱虛感邪尤易故不可以不慎穩婆産婦臨盆必須聽其自然不宜催逼安其神志不使驚慌直待瓜熟蒂自落矣故用穩婆必須擇老成忠厚者預先囑之及至臨盆務令從容鎮靜不得用手法催逼世之穩婆催逼有二有不知時候惟恐後時者有急完此家復往彼家者每因勉強試湯分之掐之逼之使下多致小兒頭身未順而手足先出或橫生或倒産為害不少若痛陳未緊眼無金花手指中節未跳動産門穀道未挺迸切不可令其坐草又或有生息不順及雙胎未下之類俱宜穩密安慰不可令産母聞知恐驚則氣散愈難生下又有一等詭詐姦滑穩婆故作哼訝之聲或輕事重報以顯己能以圖厚謝以致産婦驚疑為害不淺又有狡猾穩婆意欲害人私以手指掐破胞衣者極宜預防總之全憑自作主將不可專意聽信蓋此輩無書傳無師授此理毫無所知往往多執己見一進門來不問遲早便令坐草催其用力或揉腰或擦肚或手入探摸多致殞命可不謹哉弄痛妊婦臨月腹痛或作或止名曰弄痛非正産之候或腹雖痛而腰不甚痛非正産之候胎高未陷下者非正産之候穀道未挺迸者非正産之候水漿未破血未出者非正産之候漿血雖出而腹不痛非正産之候且令穩食安睡或扶行熟忍不可坐草試痛妊娠七八月後已能動或母有火或起居不時令胎不安致動而痛不必驚慌照常穩食安眠一二日自安或痛不止服安胎飲一二劑自愈蓋腹痛一陳緊一陳者正産也若一陳慢一陳或乍緊乍慢者皆試痛也切勿輕意坐草安胎飲黃耆蜜炙杜仲薑汁炒茯苓各一錢黃芩一錢五分白朮蜜炙黃五分阿膠炒珠二錢續斷八分甘草三分糯米百粒水煎入酒一杯和服若胸中脹滿加紫蘇陳皮各八分下血加蘄艾地榆各一錢阿膠加倍脈訣欲産之婦脈離經一呼三至沉細而滑亦同名夜半覺痛應分誕來朝午後定知生臨産宜正臥産母臨月最戒曲身眠臥蓋産母畏痛多不肯直身行動以致胎元轉身不順兒將到産門被母曲腰遮閉再轉又轉閉則必無力而不能動必致難産人見其不動則為死胎其實因無力非死也此時任有良方妙藥不能令子有力而動只要産母心安氣和漸漸調理可保無虞又有胞水已下子忽不動停一二日三五日者調治之外切戒驚恐憂懼暴躁蓋驚則神散憂則氣結暴躁則氣不順血必妄行多至昏悶知此善調自然無患睡是妙策産婦臨産時須要調養心神愛惜氣力若能上床閉目安睡片時最妙若不能睡暫時起身或扶人緩行或倚桌站立痛若稍緩又上床安睡總以睡為第一妙法但睡則宜正身仰臥使腹中寬舒小兒易於轉動蓋母坐立則兒倒懸母睡則子亦睡轉身更不費力故宜安眠穩食不可曲身亂動忍痛産婦腹痛未甚且須寬心安臥或扶令行動以便兒身舒轉如腰腹痛甚有産之兆即當正身仰臥或起坐舒伸務令安靜從容極力忍耐待兒轉身向下其産必順而且易最不宜預為驚擾入手以致産婦氣怯胞破漿干使兒轉身不易則必有難産之患若忍到沒奈何時候兒自脫然而下從未聞有私胎而難産者惟能忍痛故也惜力産婦初覺欲生便須惜力安神加意調養不可妄用氣力者恐臨産乏氣乏力也若兒方轉身而用力太早則每致橫生逆産直待兒身轉正順抵産門一逼自下若時候未到用力徒然慢臨盆産婦將産時最宜養神惜力安睡為主切不可輕易臨盆蓋兒在母腹要聽其慢慢轉身尋到産門頭向下腳向上倒懸而出若果當其時小兒自會鑽出不必過於用力過於著急即或太慢過時不過落在褲中生在床上而已有何大礙此臨産之至要千古不易之常道也臨産宜飲食産時以飲食為本有等婦人臨産不能飲食則精氣不壯以何用力必未産前預買人參三五錢或黨參三五兩將産煎服大助氣力勝於肉食又宜頻食稠軟米粥勿令飢渴以乏氣力亦不宜食硬冷難化之物恐産時乏力以致脾虛不能消化則産後有傷食之證又酒不可多飲而致醉凡産前醉則無力而四肢不用産後酒多恐引入血分四肢致後有動血及四肢無力髓骨痠痛之患臨産貴運動富貴之家過於安逸者每多氣血壅滯常致胎元不能轉動此無未産之先亦須常為運動庶使氣血流暢胎易轉動則産亦易矣是所當預為留意者臨産禁巫邪産婦臨月不可占卜問神如巫覡之徒哄嚇謀利妄言凶險禱神只保産婦聞之必生疑懼心有疑懼則氣結血滯而不順多至難産所宜戒也正産正産者將産之時穩婆以意揣度産婦以意審詳若小兒逼到産門則腹痛必急腰痛必甚胸中下陷交骨分開大小便一齊迸急眼中金花亂閃漿水或血俱下此時子已出胎産母方努力一迸子即生下庶不誤事如數證未到即半日一日不産無妨切不可老少驚慌求神許願恐産母見之聞之必生憂慮一有憂慮自然膽怯力衰飲食難進亦不可憫其痛楚急欲離身強之用力用力太早關係母子性命可不畏哉難産少婦初産交骨不開或因臨盆太早用力催逼兒橫腹內諸藥無效者宜神柞飲亦治一切難産又有破胞已久胞漿瀝盡産門風進産路乾澀而難産者宜神應散又有中年婦女生育過多氣血而虛難産者宜脫花煎又有血先下或胞漿先下子逆上衝者宜大順湯或單用黃葵子七十粒炒研末調下若統治一切難産而有效者如加味芎歸湯佛手散油蜜煎阿膠湯勝金丹歸耆湯皆可擇用又有胞水先破不即産甚至延及二三日四五日者宜用魚膠五錢煆存性研酒調下或用冬葵子三錢炒煎服神柞飲生柞枝洗銼益母草各一兩川芎五錢當歸五錢人參三分水二鍾煎一鍾溫服神應散生蜂蜜甜酒釀麻油各一杯上共煎數沸入童便一杯服脫花煎川芎二錢當歸七錢肉桂一錢牛膝二錢車前子一錢五分水二鍾煎八分熱服再飲酒數杯更妙大順湯人參二錢砂仁一錢麻油一兩熬水煎服加味芎歸湯當歸一兩血餘即壯婦頭髮如雞子大一團洗淨瓦上炙存性川芎七錢龜板一個酥炙水煎服約人行五里許即生佛手散當歸五錢川芎三錢水七分酒三分同煎七分服油蜜煎蜂蜜麻油童便各一鍾共煎溫服阿膠湯阿膠二兩炒珠赤小豆一鍾水二碗煮豆令熟去豆入膠化服每服半鍾不過三服即出勝金丹兔毫筆即敗筆頭一枝燒灰存性研生藕汁一鍾共調勻服若虛弱及素有冷疾者即以銀器盛之隔水燉溫服歸耆湯當歸一兩黃耆五錢川芎三錢益母草二錢枳殼麩炒一錢水一鍾半煎七分服橫産橫産者以兒方轉身産母用力太早以致兒身未順而先露手臂名曰覓鹽生但見兒手略有出意即令産母寬心仰臥輕輕送入弗令多出蓋出少則易入未久則易入如出多而久難入略以鹽半分塗兒手心以麻油抹兒滿手輕輕推入或以手指輕輕抓兒手心亦可切不可用刀截斷仍待兒身轉正即生倒産倒産者因兒未及轉身産母努力一逼致令兒先露足名曰踏鹽生亦令産母寬心仰臥輕輕扶入若未得入略以鹽半分塗兒足心或以手指輕輕抓兒足心仍以麻油抹兒滿足輕輕推入靜候轉正即生坐産坐産者因兒將産其母疲倦久坐椅褥抵其生路不能正生而先露臀須用手巾一條拴系高處令産母以手攀之輕輕屈足舒伸以開生路兒即順生偏産偏産者因兒未順生路産母努力一逼兒頭偏柱邊傍雖若露頂實額角也亦令産母正身仰臥穩婆輕手扶正頭頂即生若兒頭後骨偏柱穀道傍邊令穩婆以綿衣烘熱裹手急向穀道外傍輕輕托上或用膝頭抵住令兒頭正即生礙産礙産者因兒轉身時産母用力太早致兒臍帶絆肩雖兒身已正門路已順兒頭已露猶不能生須令産母仰臥穩婆輕輕推兒向上以中指按兒肩撥去臍帶靜候片時即生盤腸産盤腸産者因産母平日氣虛及臨産時用力努掙周身氣血下注以致腸隨兒下治法以潔淨不破損漆器盛之濃煎黃耆湯待溫浸之以潤其腸待兒胞衣俱下産母仰臥自己吸氣上升穩婆以麻油塗手徐徐送上宜服大劑補中益氣湯方見後膀胱落下條中一法以萆麻子十九粒去殼搗爛塗母頭頂待腸收上急以水洗去又法以醋半盞新汲水七分調勻忽噀産母之面或背即收每一噀一縮三噀三縮腸已收盡矣此法但恐驚則氣散反致他疾須慎用之如腸頭為風吹乾不能收入以磨刀水微溫潤腸另煎活磁石湯一杯産母飲之其腸自收熱産熱産者臨産時當盛暑産室宜避日色多儲清水以避熱氣更不宜多人喧嚷熱氣熏蒸以防發熱頭暈氣乏不能産下倘狂風陰雨更宜謹避總之産室當溫涼得中為妙凍産凍産者嚴冬解産宜密閉房戶多置炭火常令暖氣如春仍厚覆下體常使溫和免致難産若下部受寒以致血冷凝滯骨骱産戶堅收兒不速生急以川芎當歸各五錢加乾薑或肉桂水煎服一法以紫蘇濃煎湯熏洗亦妙大抵坐草太早去被良久多有此患慎之驚産驚産者或因少婦初次生産神氣怯弱子戶未舒腰曲不伸展轉胎側兒不能生宜紫蘇飲或因向來難産臨期恐懼以致氣結不行兒不能下宜舒郁湯紫蘇飲蘇梗人參陳皮去白各一錢當歸二錢川芎八分大腹皮二錢洗淨甘草五分白芍一錢五分酒炒水煎服舒郁湯紫蘇一錢當歸三錢長流水煎服傷産傷産者懷胎未足月有所傷動以致臍腹疼痛忽然欲産或妄服催生之藥逼兒速生或倉皇用力太早漿水先下皆不能無傷慎之可也臨産服藥臨産服藥催生切忌兔腦鼠腎二丸及回生丹蓋兔鼠二丸大耗氣而兼損血回生丹大破血而兼損氣産時百脈解散氣血虛虧服此耗氣破血之藥一令毛竅開張招風入內禍不可言一令産後大壞血虛發熱遺患無窮按此三方古今稱為神靈奇寶者尚然如此其他可知如必須服藥若加味芎歸湯佛手散二方用之不盡矣蓋産時全要血足血足如舟之得水何患不行二方大用芎歸使宿血頓去新血驟生藥品隨地皆有且使身體壯健産後無病真正有益無損此皆先賢洞達陰陽之理制此神方以利後人臨産者當共寶之加味芎歸湯當歸一兩川芎七錢血餘即壯盛婦人頭髮洗淨瓦上焙存性七錢龜板七錢酥炙水煎服約人行五里許即生佛手散當歸五錢川芎三錢水七分酒三分煎七分服臨産安慰初産時最忌追問是男是女恐因言語而泄氣或以愛憎而動氣皆易致病倘連胎生女此亦人事之常凡為翁姑與丈夫者只宜寬言安慰切不可咨嗟嘆息使婦抱怨致病傷生若因所生是女而或棄或溺者定得絶嗣之報須修德以俟之臨産血暈臨産去血太多昏不知人産下即死者名曰血暈宜芎歸湯若産後虛脫面白眼閉口開手冷六脈細微急用人參一兩水煎濃湯灌之遲則無及矣若火盛血逆而昏暈者宜清魂散如不醒以韭汁和醋灌之仍不醒急掐人中提頂心頭髮薑汁和童便灌之或荊芥穗二錢研末童便調灌若失血過多虛熱太甚目暗神昏手足厥冷者宜參歸湯若才産忽然噤口語言顛倒如見鬼神此敗血攻心也宜妙香散若猝時昏暈藥不及煎宜燒鐵稱錘令赤用器盛至床前以醋沃之令酸氣入鼻即醒或以熱醋稍含之即愈芎歸湯川芎三錢當歸三五錢水煎服清魂散人參荊芥澤蘭葉各一錢川芎四錢甘草三分共為末每服二錢或水煎服參歸湯川芎當歸人參各一錢乾薑肉桂各五分水煎服若汗多加黃耆妙香散山藥薑汁炒遠志肉制茯苓茯神各一兩人參桔梗甘草各五錢辰砂另研水飛三錢木香二錢五分另研麝香一錢另研為細末每服二錢酒下交骨不開交骨不開乃元氣虛弱胎前失於調養以致氣血不能運達而然也急令安睡內服加味芎歸湯方見前臨産服藥條中外以麻油調滑石末塗其産門即開胞衣不下兒出胎時穩婆宜以兩手輕抱産母胸前産母自己亦宜以兩手緊抱肚臍令胞衣下墜如胞衣不下亦是臨盆太早之故蓋正産時骨節開張壯者數日而合怯者彌月而合今不待其開而強出之故胎出骨眼隨閉以致胞出不及耳宜用佛手方見前難産條中加牛膝瞿麥各二錢滑石一錢水煎服若敗血流入胞中胞即脹大不得下治之稍緩脹滿腹中上衝心胸疼痛喘急宜急斷臍帶使血不入胞中免致脹滿但臍帶極脆要細心拿定先用軟絹或粗麻線繫住臍帶又將臍帶雙摺再系一道以稱錘墜之防其縮入然後剪斷過三五日自痿縮干小而下不可亂服藥亂動手若血流入胞衣血脹不下治之少緩必致脹滿以次上衝心胸疼痛喘急者宜服牛膝湯若氣血虛弱不能傳達而不下者産母但覺乏力別無脹痛宜加味芎歸湯方見前難産條中若腹痛手按稍緩是虛痛也宜保生無憂散統治胞衣不下將産母頭髮吊起急以髮梢探喉中一嘔即下牛膝湯延胡索五錢牛膝全當歸各三錢水煎服保生無憂散當歸酒浸枳殼鹽炒川芎木香白芍炙甘草各一錢半血餘炭另研乳香另研各五分水煎入血餘炭乳香二末服膀胱落下兒胞下後膀胱脫出名曰痂病或由臨盆用力太過或由氣血兩虛其色紫者可治白者難治急用狗脊散煎湯先熏後洗乘熱輕輕托進內服補中益氣湯去柴胡加醋炒白芍斂而舉之或外用黃耆煎湯熏洗亦妙狗脊湯金毛狗脊黃連五倍子水楊根枯白礬各一錢共為末水煎湯熏洗一二日愈補中益氣湯人參黃耆蜜炙白朮蜜炙甘草炙各一錢五分當歸一錢陳皮五分升麻蜜炙柴胡各三分上加薑三片棗二枚水煎服子宮脫出子宮脫出痛不可忍名曰瘣疾此由臨盆太早努力太過而然宜用萆麻子去殼十四粒研爛塗頭頂心入即洗去或用蛇床子五兩烏梅十四個煎水日洗五六次內服參薑湯參薑湯人參另燉沖藥服白芍酒炒淮山藥各一錢當歸身二錢乾薑炮五分甘草炙五分水煎服損破脬胞臨産損破脬胞小便不禁宜補脬飲但服藥時須斂氣不得作聲如作聲則無效補脬飲黃絲絹天生黃者三尺用炭灰淋汁煮爛以青水漂極淨黃蠟五錢白蜜一兩馬庇勃茅草根各二錢水二鍾煎一鍾服産門不閉産門不閉乃氣血大虛不能收攝也宜十全大補湯加五味子或痛而覺熱宜加味逍遙散或憂思傷脾而血熱者宜加味歸脾湯若暴怒傷肝而動火者宜龍膽瀉肝湯十全大補湯人參白朮蜜炙茯苓黃耆蜜炙當歸熟地黃白芍川芎各一錢肉桂炙甘草各五分薑三片棗二枚水煎服加味逍遙散當歸白芍白朮蜜炙茯神甘草柴胡丹皮梔子炒各七分薑三片水煎服加味歸脾湯人參黃耆白朮蜜炙茯苓酸棗仁各二錢遠志制當歸柴胡梔子炒各一錢木香炙甘草各五分龍眼肉七枚水二鍾煎七分食遠服龍膽瀉肝湯龍膽草酒炒人參天冬去心麥冬去心甘草黃連炒梔子炒知母各五分黃芩七分柴胡一錢五味子三分水煎溫服産後調護産後上床宜厚鋪裀褥高枕靠墊勿令睡下致血不行宜仰臥不宜側睡宜豎膝不宜伸足宜閉目靜養切忌大喜大怒亦勿熟睡恐倦極熟睡血氣上壅因而眩暈亦不宜高聲急叫以致驚恐每日以手從心下輕輕按摩至臍日五七次則惡血盡下次日乃止不問有無病痛宜以益母草煎湯攙和童便日服數次童便須臨時取用亦須清淡者為貴四壁須遮圍使無空隙庶免風寒夏日忌貪涼用扇食冷硬物及當風坐臥百日內忌夫婦交合犯之終身有病滿月後方可梳頭洗足否則手足腰腿必有痠痛等證不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆須至滿月氣血平復方可照常理事産後禁忌産後七日內毋犯冷水毋洗下部毋梳頭以勞力毋起早以冒風毋行走以傷筋骨至七日外方可用溫水洗下部尤須防産門進風月內毋多言毋勞女工毋用涼水洗手足即溫水亦宜少洗毋受驚恐毋動怒氣毋過飲食毋犯房勞即一百二十日內亦不可勞神勞力毋食重濁之物以壅滯經絡毋食辛熱之物使血妄行毋食生冷之物使血凝結毋食消導耗散之物以損氣血毋多飲醇酒以致神昏失誤毋多食鹹味以燒乾乳汁産後忌冒風而産門更宜緊防雖七日外亦須遮蓋緊密臍腹宜時用衣服烘熱溫之雖暑月亦宜厚蓋否則腹寒血氣不行且多疼痛乳少乳汁乃衝任氣血所化故下則為經上則為乳産後飲食最宜清淡不可過咸蓋鹽止血少乳且發嗽若氣血虛而乳少者或産時去血太多或産前有病以及貧苦之婦僕婢下人産後失於調理血脈枯稿或年至四十氣血漸衰往往無乳急服通脈湯虛者補之也若乳將至而未能過暢者宜湧泉散滯者通之也若肥胖婦人痰氣壅滯乳滯不來者宜漏蘆湯壅者行之也或用赤小豆煮粥食之即通若乳少無以乳兒以致母子俱瘦飲食減少宜參朮地黃湯通脈湯黃耆生用一兩當歸五錢白芷一錢通草二錢上用七星豬蹄一對煮湯吹去浮油煎藥服之服後覆面睡臥即有乳如未效再服一劑若新産者無乳者水酒各半煎服不用豬蹄若年少力壯體素強健者宜加紅花三分以消惡露湧泉散當歸黃耆生用通草各二錢穿山甲炒研瞿麥各一錢五分王不留行一錢五分七星豬蹄一對煮汁一碗入酒一杯煎服以木梳於乳上梳之漏蘆湯漏蘆二兩蛇蛻一條土瓜根一兩上為末酒調服二錢參朮地黃湯人參熟地黃白朮蜜炙各二錢當歸川芎黃耆麥冬去心茯苓各一錢炙甘草五分五味子十五粒陳皮四分上加大棗二枚水二鍾煎一鍾服乳出産後乳自出乃陽明胃氣之不固當分有火無火而治之若無火而泄不止由氣虛也宜八珍湯方見前滑胎條中十全大補湯方見前産門不閉條中若陽明血熱而溢者宜保陰煎或四君子湯加梔子若肝經怒火上衝乳脹而溢者宜加減一陰煎若乳多脹痛而溢者宜溫帛尉而散之若未産而乳自出者以胎元薄弱滋溉不全而溢也謂之乳泣生子多不育保陰煎生地黃熟地黃白芍各二錢山藥薑汁炒川續斷黃芩黃柏各一錢五分生甘草一錢水二鍾煎七分食遠溫服如小水多熱或兼怒火動血者加梔子炒黑一錢夜熱身熱加地骨皮一錢五分肺熱多汗加麥冬去心酸棗仁各一錢血熱甚者加黃連一錢五分血虛血滯筋骨疼痛加當歸二三錢氣滯而痛去熟地黃加陳皮青皮丹皮香附之類血脫血滑及便血久不止者加地榆一錢或烏梅一個少壯強盛者不必用熟地黃山藥肢節筋骨疼痛或腫脹者加秦艽丹皮各一二錢加減一陰煎生地黃白芍麥冬去心各二錢熟地黃三五錢炙甘草五七分知母地骨皮各二錢水煎溫服如躁煩熱甚便結者加石膏二錢小兒熱澀者加梔子一二錢火浮於上者加澤瀉一二錢或黃芩一錢血躁血少者加當歸一二錢四君子湯人參白朮蜜炙茯苓各二錢炙甘草一錢薑三片棗二枚水煎服吹乳産後乳兒乳為兒口氣所吹致令乳汁不通壅結腫痛不急治之多成癰腫急服栝蔞散外以南星研末溫水調敷更以手揉散之若腫痛勢甚者惟金貝煎最妙栝蔞散栝蔞一個乳香去油二錢酒煎服金貝煎金銀花貝母去心蒲公英夏枯草各三錢紅藤七八錢連翹一兩或五七錢酒二碗煎一碗服服後暖臥片時如火盛煩渴乳腫者加天花粉二三錢妬乳産後無兒飲乳或乳多兒小未能飲盡余乳蓄結作脹或婦人血氣方盛乳房作脹以致腫痛憎寒壯熱不吮通之必致成癰用陳皮一兩甘草一錢水煎服若腫結不消欲回乳者用麥芽二三兩炒熟水煎服乳癰乳癰屬膽胃二腑熱毒氣血壅滯故初起腫痛發於肌表肉色焮赤其人表熱或憎寒壯熱頭痛煩渴宜栝蔞必效散若初起結塊宜澤蘭湯外用活鯽魚一尾搗爛和臘月飴糖糟一小團研細調敷腫消即下如未消再敷一法以遠志去心取肉米泔浸炒為末每服三錢酒一鍾澄清飲之渣敷患處若膿出寒熱如瘧宜解毒散若膿出虛弱宜參耆銀花湯栝蔞必效散栝蔞一個搗爛金銀花當歸生甘草各五錢乳香去油沒藥去油各一錢水煎服一方