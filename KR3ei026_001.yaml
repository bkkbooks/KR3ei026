body:
  text: 卷一調經上月經先期經以月至為常若陽大過而月經趲前一月忽早一月則其形色多赤或紫而濃其臟氣飲食喜冷畏熱乃為血熱如證挾痰火宜服加味調經丸加味調經丸香附五斤分作五股以酒醋鹽湯童便米泔各浸三日仍用原汁煮乾再用蔥五斤取白細切拌香附焙乾以蔥白香黃為度當歸白芍生地黃各四兩黃連黃芩各三兩川芎杏仁柴胡各二兩白芷二兩五錢青皮一兩五錢荊芥滑石水飛淨各五兩共為末醋麵糊丸空心白湯下月經後期婦人以血為主惟能謹於調護則氣血周流月水自然如期若陰不足而月經退後一月忽遲一月則其形色不鮮或澀滯而少其臟氣惡寒喜暖宜服正經養血湯正經養血湯白芍酒炒當歸酒洗茯苓白朮蜜炙黃阿膠蛤粉炒各一錢五味子川椒炒甘草蜜炙各二錢半夏薑汁製人參各七分柴胡八分薑三片水煎食前服如五心煩熱日晡發熱加胡黃連五分不思飲食加神麯麥芽炒各五分頭痛加川芎七分月經或前或後脾土不勝不思飲食由此血衰故月水往後或次月飲食多進月水又往前矣治宜理脾脾旺則血勻氣順自然應期宜用紫金丸紫金丸青皮陳皮各五錢蒼朮檳榔砂仁紅豆各六錢良薑烏藥香附各八錢三稜一兩蓬朮二兩枳殼八錢共為末粳米糊為丸食後米湯下百丸一方無蒼朮蓬朮香附月經愆期經來或前或後名曰愆期此由脾胃虛弱衝任損傷氣血不足宜服加減八物湯兼服調經烏雞丸加減八物湯人參三錢白朮茯苓甘草各五錢炙白芍當歸身陳皮香附牡丹皮各一錢水煎食前服調經烏雞丸白毛烏骨未燉雄雞一隻約重一斤以糯米餵養七日勿令食蟲蟻以繩縊死干撏其毛去肚內雜臟不用納生地黃熟地黃天門冬麥門冬各二兩於雞肚內以好酒十碗文火煮爛取出肚內藥將雞連骨用桑柴火焙乾仍以前煮過生地黃等藥酒又浸又焙至雞骨肉枯為度研極細末再用人參五錢肉蓯蓉酒洗淨破故紙炒砂仁當歸身白朮川芎丹參茯苓甘草炙杜仲鹽水炒各一兩香附米醋製四兩共為細末入雞骨肉末和勻酒麵糊丸空心米湯下五十丸過期經行婦人德性溫和有痰而過期經行此氣血兩虛也宜服八物湯如性躁多怒而過期經行亦氣血虛也宜服八物湯加青皮香附兼服蒼附丸八物湯人參茯苓白朮甘草炙熟地黃當歸川芎白芍各一錢二分薑三片棗二枚水煎服如性躁者加青皮香附蒼附丸蒼朮二兩炒香附三兩童便制條芩一兩酒炒共為末神麯糊丸白湯下形瘦經不調形瘦多熱致經不調素無他症此水虧血少燥澀而然宜服加味四物湯加味四物湯熟地黃當歸白芍川芎黃芩黃連黃柏酒炒各一錢甘草五分水煎空心服形瘦過期經行形瘦素無他症而過期經行者此氣血不足也宜服十全大補湯如食少而脾胃虛弱過期經行者此氣衰血少也宜服異功散合芎歸湯兼服地黃丸十全大補湯人參白朮茯苓甘草炙黃耆肉桂熟地黃白芍當歸川芎薑三片棗二枚水煎服異功散人參茯苓白朮陳皮甘草炙薑棗為引食前服芎歸湯當歸身川芎香附枳殼各一錢炒滑石二錢薑為引地黃丸熟地黃四兩山藥山茱萸各二兩牡丹皮茯苓各一兩五錢澤瀉香附童便制各一兩形肥過期經行形肥飲食過多而過期經行者此濕痰壅滯軀脂逼迫也宜服六君子湯合芎歸湯六君子湯人參白朮茯苓炙甘草陳皮半夏芎歸湯當歸身川芎香附枳殼各一錢炒滑石二錢薑棗為引空心服一月經再行性躁多氣傷肝而動衝任之脈宜服九味四物湯兼服滋陰丸如誤食辛熱藥物致經再行亦用九味四物湯更服三補丸九味四物湯熟地黃當歸川芎白芍人參柴胡黃芩黃連甘草水煎空心服滋陰丸知母黃柏等分蜜丸滾湯下三補丸黃芩酒炒黃柏酒炒黃連酒炒蜜丸白湯下每月經來二三次經來幾點而止過五六日或十日又來幾點一月之內常行二三次面色青黃先服膠艾湯一二劑次服紫金丸膠艾湯阿膠白芍熟地黃各一錢艾葉三錢川芎八分大棗三枚水煎空心服紫金丸青皮陳皮各五錢蒼朮檳榔砂仁紅豆各六錢良薑烏藥枳殼香附各八錢三稜一兩蓬朮二兩粳米糊丸食後米湯下百丸一方無蓬朮蒼朮香附經來不止經來十日半月不止乃血熱妄行也當審其婦曾吃椒薑熱物過度治之猶易宜用金狗湯金狗湯金毛狗脊川續斷阿膠地榆川芎當歸白芷各一錢白芍黃芩各八分熟地黃二錢水煎空心服數月行經形盛多痰氣虛至數月而經始行者宜服蒼附六君湯兼服蒼附導痰丸若形瘦脾胃虛弱氣血兩虧至數月而經始行者宜服十全大補湯蒼附六君湯人參白朮茯苓甘草炙半夏陳皮蒼朮米泔浸香附童便制條芩酒炒川芎當歸枳殼麩炒水煎食前服蒼附導痰丸蒼朮香附枳殼各二兩陳皮茯苓各一兩五錢膽星甘草各一兩共為末薑汁和神麯丸淡薑湯下十全大補湯人參白朮蜜炙茯苓甘草炙熟地黃當歸川芎白芍黃耆蜜炙肉桂薑棗為引經來色紫經來色紫者熱也慎勿作風冷而行溫熱之劑宜服四物連附湯四物連附湯當歸尾赤芍香附童便制黃連丹皮甘草水煎食前服經來色淡經來色淡者血虛也宜服加味八物湯兼服地黃丸加味八物湯人參白朮蜜炙茯苓甘草炙熟地黃當歸川芎白芍各一錢二分黃耆炙香附四制各一錢薑為引水煎服地黃丸熟地黃四兩山藥炒山茱萸各二兩丹皮白茯苓各一兩半澤瀉香附童便制各一兩形瘦經少形瘦經少此氣血弱也宜服加味四物湯加味四物湯熟地黃當歸川芎白芍人參香附童便制甘草炙薑棗為引形肥經少形肥經少此痰凝經隧也宜服二陳湯合芎歸湯二陳湯陳皮半夏制各二錢茯苓炙甘草各一錢芎歸湯川芎當歸身香附童便制枳殼各一錢炒滑石二錢薑為引合二陳湯水煎服經來過多經多不問形肥形瘦皆屬於熱宜服增味四物湯兼服三補丸或單服增味四物湯亦可增味四物湯熟地黃當歸川芎白芍各一錢黃芩知母酒炒黃連薑汁炒黃柏酒炒甘草各五分薑為引水煎服三補丸黃芩酒炒黃柏酒炒黃連蜜丸白湯下經來如豬肝水經來如豬肝水五心煩熱腰腹疼痛面黃肌瘦不思飲食此氣血皆虛也先用黃芩湯退其煩熱後用調經丸調其氣血黃芩湯黃芩六分當歸一錢川芎八分天花粉知母酒炒蒼朮白芍各七分水煎服一方無蒼朮白芍有甘草七分調經丸生地黃熟地黃當歸白芍三稜蓬朮玄胡索白茯苓各一兩川芎砂仁烏藥各八錢炒香附一兩二錢大茴小茴各二兩共為末粳米糊丸如梧子大每服百丸酒下經來如屋漏水經來如屋漏水頭昏目眩小腹作痛更兼白帶咽中臭如魚腥噁心吐逆此血虛有熱也先用理經四物湯次用內補當歸丸理經四物湯川芎當歸白芍生地黃白朮蜜炙柴胡香附童便制玄胡索各一錢黃芩三稜各八分水煎臨臥服內補當歸丸續斷阿膠炒蒲黃炒黑肉蓯蓉酒浸焙厚朴薑汁炒山茱萸白茯苓香附童便制當歸白芷各一兩川芎白芍各八錢甘草炙乾薑各五錢熟地黃一兩五錢共為末煉蜜為丸白湯下八十丸空心服經來如黃泥水此大虛症也最忌涼藥宜用加味四物湯以暖其經以和其血加味四物湯川芎當歸玄胡索烏藥各一錢炒白芍酒炒小茴各八分熟地黃二錢生薑二片水煎空心服經來如銅緑水經一全無紅色乃大虛大冷也忌用涼藥宜服烏雞丸半月非特病愈而且有孕烏雞丸烏雞肉去皮油不用酒蒸熟三兩山藥炒肉桂肉蓯蓉酒洗淨炒蒲黃炒黑當歸山茱萸白芍各一兩熟地黃一兩五錢大附子三錢制鹿茸一錢酥制川芎五錢共為末粳米糊丸空心酒下百丸經來全白色經來白色五心煩熱小便作痛面色青黃乃血氣虛也亦忌涼藥宜服烏雞丸方見前半月即有孕經來成塊如蔥白色經來成塊如蔥白色或如死豬血黑色頭昏目暗口唇麻木此虛冷也藥忌寒涼急服內補當歸丸內補當歸丸續斷阿膠炒珠蒲黃炒黑肉蓯蓉酒洗淨炒厚朴薑汁炒山茱萸白茯苓香附童便制當歸白芷各一兩川芎白芍各八錢甘草乾薑各五錢熟地黃一兩二錢共為末煉蜜丸空心白湯下八十丸經來臭如腐肉此乃血弱更傷熱物譬如溝渠水乾天氣無雨久則臭也身衰舊血少新血不生則臭如夏月腐肉宜服龍骨丸兼服通瘀飲龍骨丸龍骨煆海螵蛸生地黃各一兩白芍當歸酒炒牡蠣粉川芎黃芩白茯苓各八錢共為末煉蜜丸空心酒下百丸通瘀飲當歸酒洗三稜莪朮赤芍丹皮白朮蜜炙香附童便制豬苓陳皮木通各八分生薑一片水煎服經來如魚腦髓經來如魚腦髓雙腳疼痛不能舉動乃下元虛冷更兼風邪所致當行血行氣宜服蘇風止痛湯蘇風止痛湯天麻殭蠶炒紫金皮烏藥炒牛膝獨活川芎當歸乳香去油南藤補骨脂炒生薑三片蔥白二莖酒煎空心服經來如牛膜片經來不止兼下物如牛膜片昏迷倒地乃血氣結聚變成此症症雖驚人卻無大事宜服朱雄丸朱雄丸硃砂水飛雄黃各一錢白茯苓二兩共為末水丸薑湯下五十丸經來下肉胞經來不止忽下肉胞三五個狀如雞子大軟如絮用刀剖開內如石榴子昏迷不省人事症亦驚人宜服十全大補湯五劑即安十全大補湯人參白朮茯苓甘草熟地黃當歸川芎白芍黃耆炙肉桂薑三片棗二枚溫服經從口鼻出經不往下行而從口鼻中出名曰逆經此由過食椒薑辛熱之物熱傷其血則血亂上行宜服犀角地黃湯數劑犀角地黃湯犀角白芍牡丹皮枳殼炒各一錢生地黃三錢黃芩桔梗陳皮百草霜各八分甘草三分水煎空心服逆經咳嗽氣急經從口鼻出五心煩熱咳嗽氣急治宜推血下行先服紅花湯七劑再服款冬湯止嗽下氣四五劑可安紅花湯紅花黃芩蘇木各八分天花粉六分水煎空心服款冬湯款冬花桔梗粟殼蜜炙蘇子炒紫菀知母各八分石膏桑白皮蜜炙杏仁去皮尖各一錢水煎服經從大小便出經來大小便俱出名曰差經此因食熱物過多積久而成治宜解其熱毒順其陰陽宜服分利五苓湯分利五苓湯豬苓澤瀉白朮蜜炙赤芍各一錢阿膠炒當歸酒洗川芎各八分水煎空心服經來吊陰痛經來有兩條筋從陰吊至兩乳痛不可忍身上發熱宜服川楝湯二劑即安川楝湯川楝子炒大茴小茴豬苓澤瀉白朮各一錢蜜炙烏藥炒檳榔乳香去油玄胡索各八分木香五分麻黃六分薑三片蔥一根水煎服經來小便痛經來小便痛如刀割此乃血門不通人皆用八珍散不效急服牛膝湯牛膝湯大牛膝三兩麝香一分乳香一錢去油水一盞半煎牛膝至一盞臨服磨麝乳二香入內空心服經來脅氣痛經來脅內有一塊如杯作痛其血淡黑色宜治塊為先急服四物玄胡湯四物玄胡湯熟地黃當歸白芍川芎各七錢五分玄胡索四兩沉香五錢每服三錢水煎服經來遍身痛經來二三日遍身疼痛此寒邪入骨或發熱或不發熱俱宜解表宜服烏藥順氣湯烏藥順氣湯烏藥炒殭蠶炒川芎白芷陳皮枳殼各八分麩炒乾薑炒甘草各五分麻黃四分薑三片蔥一根水煎溫服經前腹痛經水將來而臍腹絞痛此血澀不行以作痛也宜服通經湯通經湯熟地黃當歸川芎白芍川楝子炒小茴香檳榔玄胡索木香各七分水煎食前服經來腰腹痛經來腰腹痛而氣滯血實者宜服桃仁湯桃仁湯當歸尾赤芍生地黃香附童便制牡丹皮紅花玄胡索桃仁另搗如泥沖服水煎臨服時入桃仁泥空心服形瘦有火加條芩黃連形肥多痰加枳殼蒼朮半夏經來小腹痛經來小腹結成塊或如皂角一條橫過痛不可忍面色青黃不思飲食宜服玄胡散半月可愈玄胡散玄胡索四兩頭髮灰四錢為末酒調下經來未盡腹痛經來一半余血未盡腹中作痛或