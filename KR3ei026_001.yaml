酒炒當歸身酒洗川芎陳皮各一錢柴胡七分炙甘草五分薑三片棗二枚水煎服鹿角丸鹿角霜當歸身茯神龍骨煅阿膠牡蠣粉炒珠柏子仁炒香附酒炒山藥各二兩川芎川續斷各一錢炙甘草五分上為末取白茅根搗汁糊丸補中益氣湯送下七十丸空心服崩後下白帶脈訣曰崩中日久為白帶漏下多時骨髓枯言始病血崩久則血少復亡其陽故白滑之物下流不止血海將枯也宜服補經固真湯養陰丸補經固真湯乾薑研末人參各二錢郁李仁酒蒸搗泥柴胡炙甘草陳皮黃芩生用各一錢白葵花七朵上除黃芩以水二鍾煎藥至一鍾半再入黃芩煎至一鍾空心熱服以美膳壓之養陰丸龜板酒炙黃柏酒炒枳殼麩炒乾薑炙甘草為末醋丸日服二次溫湯下漏下不止婦人漏下不止其色鮮紅先由勞役脾胃虛損氣短氣逆自汗不止身體發熱大便泄瀉四肢無力不思飲食宜服黃龍湯黃龍湯黃耆蜜炙一錢五分當歸白芍白朮蜜炙蒼朮米泔浸陳皮各一錢生地黃炙甘草各三錢熟地黃五錢柴胡二錢水煎服殺血心痛婦人血崩而心痛甚者名曰殺血心痛此因心脾血虛心無所養是以作痛若小産去血過多而心痛甚者亦然但當專用甘溫以養營氣宜用十全大補湯倍用參術連服數十劑以痛止為度十全大補湯人參白朮蜜炙各三錢熟地黃當歸川芎白芍茯苓黃耆蜜炙各一錢肉桂炙甘草各五分薑三片棗二枚水煎服帶下虛熱婦人帶下脈數虛而兼熱宜服千金散千金散枸杞子一兩生地黃五錢酒一鍾煎至半鍾服赤白帶下證治帶下令人不産育宜急治之扁鵲過邯鄲聞貴婦人所以專為帶下醫也赤者熱入小腸白者熱入大腸原其本皆濕熱結於任脈滲入膀胱出於大小腸之分溲出津液淋瀝以下故曰白帶下輕則下而不多重則下而無度淋露日久遂使精血乾枯肌肉消瘦治當升陽益陰則清濁自分補脾養胃則濕熱自除尤當斷厚味補元陽而帶下可止矣赤白帶經驗方當歸酒洗生地黃酒洗白芍酒炒白雞冠花子白朮蜜炙建蓮肉去心川芎各一錢炙甘草七分扁豆花炒七分白者治白帶赤者治赤帶水煎食遠服瘦人多熱加黃連薑汁炒黃柏酒炒香附醋製各五分肥人多痰加南星制蒼朮米泔浸半夏制各六分久下不止加熟地黃一錢山茱萸八分氣虛加人參去蘆黃耆各七分赤帶加黃芩酒炒一錢荊芥六分腹痛加煨薑一片或加葵花五朵更炒白者治白帶赤者治赤帶瘦人赤帶多熱瘦人血虛生熱多下赤帶宜服清熱四物湯兼三補丸清熱四物湯熟地黃當歸酒洗各三錢白芍二錢川芎一錢黃柏酒炒牡丹皮各七分黃連薑汁炒升麻炒各五分水煎湯服後三補丸空心服三補丸黃芩酒炒黃柏酒炒黃連酒炒各等分蒸餅為丸肥人白帶多痰肥人氣虛生痰多下白帶宜服柴術六君湯兼蒼附導痰丸柴術六君湯人參白朮蜜炙茯苓各二錢甘草蜜炙一錢陳皮半夏制蒼朮各一錢五分柴胡一錢升麻炒五分薑三片水煎空心服蒼附導痰丸蒼朮米泔浸香附四制枳殼麩炒各二錢陳皮茯苓各一兩五錢膽星甘草各一兩上為末薑汁和神麯丸柴術六君湯送下五十丸白帶腥臭帶久不止陽氣虛極下流白滑如涕腥氣難聞多悲不樂此大寒之證也宜服桂附湯桂附湯附子甘草湯制熟肉桂多油者各一錢黃柏酒炒知母炒各五分水煎食前服白帶腹痛白帶日久不止臍腹冷痛宜服九霄丸九霄丸靳艾酒浸一宿煮乾牡蠣粉尤骨煅當歸酒炒各一兩乾薑炮二兩吳茱萸滾湯泡炒白芍酒炒各七錢山藥薑汁炒一兩半白石脂煅醋淬七次研一兩為末酒丸白湯下三十丸白淫證治白淫時常隨小便而出渾濁如米泔此胃中濁氣滲入膀胱而成是帶之類也宜服益智湯益智湯陳皮茯苓白朮蜜炙甘草炙蒼朮制各二錢益智仁柴胡各一錢升麻五分水煎空心服白濁證治白濁時常淋出清冷稠黏或小便後淋瀝數點此下元虛損精不能攝因滑而出赤帶之類也宜服分清飲分清飲川萆薢去蘆益智仁鹽水炒烏藥炒石菖蒲九節者炒茯苓各一錢五分枳殼麩炒炙甘草各一錢水煎入鹽少許熱服
