body:
  text: 卷二安胎上妊娠脈訣歌肝主血兮肺主氣血為榮兮氣為衛榮衛和諧胎必成血衰氣盛未有體寸微關滑尺帶數流利往來如雀啄三部沉正等無疑尺按不止胎始確滑疾不散三月胎但疾不散五月母弦緊牢強滑利安沉細而微歸泉路驗胎有無婦人二三月經水不行疑是有孕又疑血滯心煩寒熱恍惚不定宜用驗胎散以探之服後一時許覺腹內中動則有胎也臍下動乃血瘕也不動則血凝而非胎也如一服未效再用紅花煎湯調服無不神效驗胎散雀腦川芎一兩大當歸七錢上不見火研末分作二次服濃煎艾葉湯調服脈辨男女歌左手沉實是男胎右手浮弦女孕來兩尺偏大分男女命門滑疾主懷胎左脈帶縱兩個男右手帶橫一雙女左手脈逆生三男右手脈順生三女寸關尺部皆相應一男一女分形證諸陽為男諸陰女指下分明常記取愚按男左女右胎之所居氣血聚焉故左盛則男右盛則女嘗診癰疽脈癰疽在上則寸脈盛癰疽在下則尺脈盛癰疽在左則左脈盛癰疽在右則右脈盛此左盛男右盛女之理也胎辨男女法婦人有孕三五月之間令人摸之上小下大形如箕者為女以女胎面向母腹其足膝抵母腹故也中正圓高形如釜者為男以男胎面向母背其背脊抵母腹也又妊婦左乳房有核為男右乳房有核為女又男動在三月陽性早也女動在五月陰性遲也是胎氣鍾於陽則生男鍾於陰則生女也預知男女法命妊婦前行夫從後急呼之左回首者是男右回首者是女蓋男胎在左則左重故回首時慎護重處而就左也如胎在右則右重故回首時慎護重處而就右也推之於脈亦然胎在左則血氣護胎而盛於左故脈亦從之而左疾為男左大為男也胎在右則血氣護胎而盛於右故脈亦從之而右疾為女右大為女也此陰陽自然之理也轉女為男法易曰乾道成男坤道成女此定理也男子平時清心寡欲養其乾健之體則得其所感而生男又積德以正心更能戒殺則冥冥之中自有報應孕必生男且俊且壽故天之生物必因其材而篤焉此生男神效法也至於受胎時日之法謂經盡一二日感者成男三四五日感者成女似為近理終不足憑即今方家備載轉女為男之法用之或驗或不驗未可深信然物易得而用在外亦有益而無損姑録數法於後附法婦人始覺有孕以斧置婦床下系刃向下勿令知之若不信待雞抱卵時以斧懸窠下則一窠盡是雄雞又法受孕之後用弓弦一條繫縛婦人腰中滿百日去之又法受妊三月以前用雄雞尾尖上長毛三莖潛安婦人臥床下勿令知之又法始知有孕用明雄黃三兩絳囊盛佩帶婦左腰間即生男以雌黃佩之即生女妊娠宜禁房勞保胎以絶欲為第一要策其次寡欲然絶欲甚難苟能寡欲則身心清靜不犯房勞胎安而産易即嬰兒亦可少病而多壽若不知謹戒而觸犯房事三月以前多犯暗産三月以後常致胎動小産即幸免夫小産一則胞衣太厚而難産二則子身有白濁而不壽三則多患瘡毒出痘細密難起以致夭亡皆由父母淫欲之過也妊娠宜小勤勞婦人有孕全賴血以養之氣以護之宜時常行動令氣血流通筋骨堅固胎在腹中習以為常雖微閃挫不致墮胎然非孕後方勞正謂平日不宜過逸耳若久坐久臥氣血凝滯後必難産常見田家勞苦之婦孕而不墮正産甚易可證也妊娠宜戒生冷胎前喜食生冷只因懷孕以後多惱多氣不慎房勞以至火旺口渴殊不知生冷等物豈能退血分之熱徒使脾胃受傷瘧疾痢疾嘔吐泄瀉諸病皆由此起病則消耗精液口渴愈甚惟戒惱平怒慎房勞服健脾補血之藥調理本原可保平復否則臨産之虛脫産後之絶證斷不可免也妊娠宜慎寒溫胎前感冒外邪或染傷寒時證鬱熱不解多致小産墮胎攸關性命要知起居飲食最宜調和夏不登樓宜著地氣夜不露坐宜暖背腹古云不受寒自不發熱不傷風自不咳嗽此胎前緊要關頭敢不慎歟妊娠宜知靜養胎前靜養乃第一妙法不校是非則氣不傷矣不爭得失則神不勞矣心無嫉妒則血自充矣情無淫蕩則精自足矣安間寧靜即是胎教紹宗祧之重承舅姑之歡葉琴瑟之和衍蠡斯之慶所以古人必先靜養無子者遵之即能懷孕懷孕者遵之即能易産靜養所關豈不大哉妊娠宜戒惱怒凡受胎後切不可打人罵人蓋氣調則胎安氣逆則胎病惱怒則痞塞不順肝氣上衝則嘔吐衄血脾肺受傷肝氣下注則血崩帶下滑胎小産欲生好子者必須先養其氣氣得其養則生子性情和順有孝友之心無乖戾之習所謂和氣致祥閣家吉慶無不由胎教得之妊娠須知調護受孕之後衣無太暖暖則竅開易招風寒食無太飽飽則傷神有礙胎産飲無太醉醉則亂性子必淫暴且酒散百脈致成諸疾凡一切藥物勿用酒煎為要勿妄服湯藥勿妄用針灸勿過勞力勿多睡臥須時時行步勿登高廁勿入産婦房勿到喪亡家勿進熱鬧場勿登高涉險恐傾跌有損勿舉手向高取物恐傷胎而子鳴腹中勿看宰殺凶惡之事勿看修造立木動土勿看戲及鬼怪形象異物看則必驚子必癲癇又勿多洗浴洗浴過多毛竅頓開易受風寒尤易墮胎凡初受胎及臨月尤宜禁戒經云刀犯者形必傷泥犯者竅必塞打擊者色青黑繫縛者相拘攣甚至母殞驗若反掌可不戒哉妊娠宜節飲食胎之肥瘦氣通於母恣食厚味多致胎肥難産故孕婦調攝飲食宜淡泊不宜濃厚宜清虛不宜重濁宜和平不宜寒熱但富貴之家肥甘悅口抑令從儉簡素勢必不能酌其所宜開列於後蓮子芡實松子熟藕山藥鯽魚鴨鱸魚鰻魚銀魚海參淡菜豬肚筍鯗魚麻油解毒腐皮滑胎此二味臨月尤宜多服妊娠飲食禁忌受孕之後食犬肉令子無聲食兔肉令子缺唇食薑芽令子多指食螃蟹令子橫生食羊肝令子多厄食鱉肉令子項短縮頭食鮎魚令子生疳蝕瘡食山羊肉令子多病食野鴨肉令子倒生食鴨卵令子心寒食雞肉雞卵同糯米食令子生寸白蟲食雀肉飲酒令子多淫無恥或生雀子斑食諸般茵菌令子驚風而夭他若麥芽大蒜最消胎氣薏米莧菜亦易墮胎至於無鱗魚驢馬肉食之過月難産若生冷辛熱煎炒油麵等物亦宜避忌免後多病只宜蔬飯薄粥少佐肉食妊娠藥物禁忌蚖青斑蝥水蛭及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣三稜代赭芫花麝大戟蛇蛻莪術雌黃雄黃牙硝芒硝牡丹桂桂枝肉桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通木通硇砂乾漆蟹甲爪地膽茅根及萆麻常山商陸並牛黃黎蘆胡粉金銀箔王不留行鬼箭羽神麯葵子與大黃妊娠宜服藥餌胎前産後藥能起死回生世人鑑誤治之失遂言胎産不必服藥迷亂人意愚者株守強忍以致失於調養氣血虧損諸證蜂起卒致難治安可因噎而廢食乎若知保養隨時調治氣充血盈胎安産易其所以安全母子者藥餌之功正不淺也妊娠護胎法孕已知覺用布一幅闊六七寸長可橫纏腰間兩道者常束腰間直至臨盆方解蓋胎當未長成得此腰膂有力偶或撲跌不致損胎及臨産解開腹中乍寬胎兒轉身亦易誠護胎之妙訣也初月胎形婦人初受胎一點精血凝成一粒形如珠露乃太極動而生陽天一生水謂之胚此月未有宮羅在裩戶之間未入腹內若無寒熱疼痛不必服藥尤不可觸犯房勞致成暗産二月胎形妊娠受胎一月滿足精血近陽珠露變成赤色形如桃花瓣子乃太極靜而生陰地二生火謂之腪此月在母陰戶內六七寸已入腹內未入衣里或動或不動猶有狐疑若吐逆吞酸有孕明矣或偏嗜一物則知一臟之虛如愛酸物乃肝臟不能養血而虛也三月胎形三月形如蠶繭漸漸長大一頭大一頭小其微圓未入宮羅已至臍下微有薄衣包裹乃太極乾道成男坤道成女也故謂之胎此月胎最易動最宜防護四月胎形四月男女已分始受水精以成血脈形體初具六腑順成此月已入宮羅之室衣裹漸至丹田之所忌食牛馬豬頭諸般發毒之物五月胎形五月始受水精以成其氣筋骨四肢初成毛髮始生此月已入宮室其胎安穩令人摸之如覆杯者是男如肘頸參差起者是女也六月胎形六月始受金精以成其筋口目皆成此月男動左女動右常在臍中漸漸浮上如魚浮水一般七月胎形七月始受木精以成其骨皮毛初成遊其魂能動左手此月男向左肋動女向右肋動七月已足亦有降生成人所以妊娠至此行步艱難八月胎形八月始受土精以成皮膚形骸漸長九竅皆成遊其魄能動右手此月臟腑初具毛髮俱生元神俱降真靈也九月胎形九月始受石精以成皮毛百節畢備三轉其身此月谷入胃眼有光鼻有氣耳有聞口有味宮室羅布以定生人也十月胎形十月受氣足五臟六腑齊備納天地氣于丹田關節人神皆備待時而生其有延月而生者富貴而壽有月不足者貧賤而夭初月養胎妊娠一月名胎胚飲食須精熟酸美勿受御宜食大麥毋食腥辛是謂才正是月足厥陰肝脈養胎其經不可針灸肝主筋及血一月之時血行否澀不為力事寢必安靜無令恐畏此月經閉無潮熱疼痛不可輕率服藥若素體弱及慣墮胎者一有不安即當調治而預防之宜大安胎飲大安飲胎當歸二錢熟地黃白朮蜜炙川芎煨白芍酒炒續斷鹽水炒條芩酒炒砂仁不炒去殼桑寄生各一錢人參炙甘草荊芥穗各五分水一鍾半煎七分服如氣不順而喘加蘇梗一錢二月養胎妊娠二月名始膏毋食辛臊居必靜處勿犯房勞百節皆痛是為胎始是月足少陽膽脈養胎其經不可針灸膽主精二月之時兒精成於胞里當慎護之勿驚動也若氣血不足胎氣始盛逆動胃氣噁心嘔吐飲食少進宜半夏湯半夏湯陳皮去白鹽水炒半夏薑製炒黃茯苓各一錢子芩酒炒枳殼麩炒紫蘇各八分甘草炙五分三月養胎妊娠三月名始胞此時未有定象見物而化欲生男者操弓矢欲生女者弄珠璣欲子賢能講論詩書欲子端嚴口談正言身行正事是外象而內感者也是月手厥陰心胞絡脈養胎其經不可針灸胞絡屬心毋悲哀思慮驚動此月心經火盛最易墮胎若嘔吐不止飲食少進宜抑青丸須未交三月前服起抑青丸川黃連薑汁炒三次三兩研末米糊丸如緑豆大每服三四分加至七八分用半夏湯方見上煎湯送下四月養胎妊娠四月始受水精以成血脈食宜稻宜魚是謂盛血氣以通耳目而行經絡是月手少陽三焦脈養胎其經不可針灸內輸三焦此時兒六腑順成當靜形體和心志節飲食若倦臥不安或口苦頭痛腳弱及腫急宜安胎和氣散安胎和氣散白朮蜜炙一錢五分廣陳皮去白鹽制白芍炒黃芩酒炒各一錢當歸身一錢六分茯苓八分香附鹽水制二錢川芎炙甘草各五分水煎服如熱多加山梔仁炒黑一錢五月養胎妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣服食稻粱羹牛羊調五味是謂養氣以定五臟是月足太陰脾脈養胎其經不可針灸此時兒四肢皆成毋太飢飽毋食乾燥炙熱毋太勞倦若胎長腹重睡臥不安宜養胎飲養胎飲白朮蜜炙一錢五分當歸身酒洗白芍酒炒澤瀉鹽水炒各一錢川芎黃芩酒炒枳殼麩炒各八分炙甘草四分水一鍾半煎七分服二劑六月養胎妊娠六月始受金精以成其筋宜小勞毋逸欲毋食鳥獸肉是謂變腠理紉筋以養其力以堅背膂是月足陽明胃脈養胎其經不可針灸胃主口目此時兒口目皆成調五味食甘美毋太飽是月胎氣不和卒有所動不安或腹痛或脹悶宜安胎和勝飲安胎和勝飲當歸二錢白朮蜜炙一錢五分黃芩酒炒白芍酒炒砂仁炒去衣茯苓續斷酒蒸各一錢炙甘草五分水一鍾半煎七分服六日進一服七月養胎妊娠七月始受木精以成其骨勞身搖肢毋使安逸動作屈伸以運血氣居燥處飲食避寒食稻粱以密腠理是謂養骨而堅齒是月手太陰肺脈養胎其經不可針灸肺主皮毛此時兒皮毛已成毋多言哭毋洗浴毋薄衣毋飲冷若胎氣不安或損傷漏血或腹大重墜宜清胎萬全飲清胎萬全飲阿膠蛤粉炒珠熟地黃白芍酒炒黃芩酒炒各一錢續斷酒蒸當歸土炒川芎各一錢五分茯苓炒荊芥炒桑寄生各八分炙甘草水煎服二劑八月養胎妊娠八月始受土精以成皮膚和心靜息無使氣極是謂密腠理而光澤顏色是月手陽明大腸脈養胎其經不可針灸大腸主九竅此時兒九竅皆成毋食燥物毋大怒若胎氣不安氣逆氣喘不問有無外感宜和胎調氣飲和胎調氣飲陳皮去白炒二錢黃芩酒炒一錢五分茯苓炒白朮蜜炙各一錢枳殼麩炒蘇梗各八分炙甘草五分九月養胎妊娠九月始受石精以成皮毛六腑百節無不悉備飲醴食甘緩帶是謂養毛髮致才力是月足少陰腎脈養胎其經不可針灸腎主續縷此時兒脈絡續縷皆成毋處濕冷毋著炙衣故雖無他證亦宜順氣和中安胃使無難産之患宜順胎飲順胎飲當歸二錢白朮蜜炙二錢五分黃芩酒炒蘇梗白芍酒炒大腹皮酒炒各一錢水煎服八日進一服十月養胎妊娠十月五臟俱備六腑齊通納天地氣于丹田關節人神皆備待時而生是月足太陰膀胱脈養胎其經不可針灸自初月至此唯手少陰手太陽心脈也以君主之官無為而尊也宜滑胎飲滑胎飲當歸茯苓各一錢五分白朮蜜炙川芎煨香附制陳皮去白各一錢蘇梗八分黃芩酒炒五分炙甘草三分水煎服如氣虛加人參一錢胎肥者加枳殼麩炒一錢五分二三日進一服至産方止初月胎證婦人月經一月不行六脈平和或見吞酸惡食或見微寒微熱懶於舉動胎也若六脈中見有病脈便非若知已有胎而噁心嘔吐不思飲食惟養血安胎理氣健脾為第一要策宜中和湯少婦初次懷胎一月滿足含羞不對人言醫者不識誤作阻經醫治致有頭暈嘔吐噁心飲食不進腰腹疼痛六脈浮緊及體弱病後受胎宜罩胎煎中和湯人參六分當歸身一錢五分砂仁炒香附制各一錢白芍酒炒茯苓藿香陳皮去白各八分炙甘草五分水一鍾半煎七分空心服罩胎煎當歸白芍酒炒各一錢半枳殼麩炒二錢砂仁一錢炙甘草五分水煎空心服二月胎證妊娠稟受怯弱受胎一月便有阻病顏色如故脈息和順但覺肢體沉重頭目皆眩惡食擇食甚者或作寒熱嘔吐痰水恍惚不能支持宜茯苓湯若臟寒嘔惡胎氣不安宜理陰煎若心虛煩悶惡進飲食宜木瓜湯若胃虛氣逆嘔吐不食宜縮砂散若寒儉之婦移磚運瓦觸傷胎氣致胎不安宜和氣散若慣墮胎者宜每月服和氣散二劑保過五個月而止茯苓湯赤茯苓熟地黃各一錢半夏制炒黃一錢旋覆花人參白芍炒川芎桔梗甘草炙橘紅各七分薑七片水煎濾渣服理陰煎熟地黃三錢當歸二錢炙甘草一錢乾薑炒一錢水一鍾半煎七分食遠服木瓜湯人參一錢橘紅枇杷葉去毛蜜炙木瓜麥冬去心藿香各八分竹茹彈子大一丸薑三片水煎溫服縮砂散縮砂仁炒去殼研極細末每服二錢薑汁調米飲下和氣散藿香陳皮白朮蜜炙砂仁炒黃芩桔梗益智仁各一錢厚朴薑製枳殼麩炒各一錢半甘草炙蘇葉各八分小茴七分燈心十莖水煎空心服三月胎證婦人受胎經三月而墮者雖氣血不足亦中衝脈有傷中衝即陽明胃脈供養胎孕至此時必須節飲食絶嗜欲戒惱怒若胎動不安宜千金保胎丸若大便燥厥腹滿努力難解無故悲泣謂之臟躁宜清燥湯若值天時大寒大熱所染各證宜和氣散加減服之千金保胎丸杜仲薑汁炒斷絲白朮蜜炙各二錢當歸酒洗熟地黃薑汁炒阿膠蛤粉炒成珠益母草川續斷酒炒香附米四制條芩酒炒各一兩川芎艾葉醋煮陳皮去白各五錢砂仁二錢五分炙甘草一錢上為末棗肉和丸梧子大每服百丸空心米飲下清燥湯栝蔞仁炒研白芍酒炒當歸身各一錢半生地黃酒洗麥冬去心麻仁炒各二錢枳殼麩炒條芩各一錢甘草四分松子仁三錢河水煎入蜂蜜十匙溫服和氣散藿香陳皮白朮蜜炙砂仁炒黃芩桔梗益智仁各一錢厚朴薑汁炒枳殼麩炒各一錢半甘草蘇葉各八分小茴七分燈心十莖水煎服熱加柴胡一錢黃芩加倍瘧加青皮一錢草果一錢五分嗽加杏仁去皮尖杵五味子各一錢半喘加香附米制一錢嘔加茯苓半夏制炒黃各一錢四月胎證妊娠四月身體困倦寒熱往來飲食無味貪睡頭暈四肢痠軟宜活胎散若內熱體倦腰腿痠痛白帶淋漓小便頻數不思飲食宜固真飲活胎散蘇葉六分枳殼麩炒一錢三分厚朴薑製香附制各一錢砂仁蒼朮米泔浸陳皮去白各七分小茴香甘草各五分水煎溫服固真飲白朮蜜制條芩續斷鹽水炒白蓮鬚芡實廣陳皮杜仲鹽水炒斷絲山藥各一錢五分麥冬去心二錢白建蓮不去心五粒杵天泉水或井華水煎服五月胎證胎臨五月妊娠困弱但覺腹重貪睡飲食無味腹中膨脹宜瘦胎飲若稟賦虛弱胎萎不長由血虛者宜四物湯加香附砂仁由氣虛者宜四君湯加香附砂仁由氣血兩虛者宜八珍湯加香附砂仁古人治胎前證每將人參砂仁同用取其一補一順補則氣旺而無墮胎之患順則氣和而無難産之憂良要法也瘦胎飲當歸身白朮蜜炙各七分澤瀉白芍枳殼麩炒益智仁香附制各一錢柴胡甘草各五分水煎空心服加味四物湯熟地黃當歸各一錢五分川芎白芍香附制各一錢砂仁炒五分薑三片棗二枚水煎服加味四君湯人參白朮蜜制茯苓各一錢五分炙甘草香附制各一錢砂仁炒五分薑三片棗二枚水煎服八珍養胎飲人參白朮蜜炙茯苓熟地黃當歸白芍川芎香附制各一錢砂仁炒去殼五分炙甘草五分薑三片棗二枚水煎服六月胎證妊娠元氣不實發熱倦怠致胎不安宜當歸散若飲食不甘