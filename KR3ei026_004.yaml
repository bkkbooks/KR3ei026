外風入腹變為臍風亦不可太短太短則逼內而傷臟或致成腹痛而夜啼只以兒之足掌為度裹臍法裹臍須將臍帶盤作一團用枯礬末摻於帶上用新棉花約厚半寸封蓋外用軟絹裹束緩急得中急則令兒吐日日須要照看勿令兒尿浸濕又不可輕意頻解解時須閉戶下帳勿令見風仍以枯礬末敷之若臍濕爛不幹或用枯礬五錢龍骨煅黃丹各一錢麝香少許研末敷之或用亂髮燒灰敷之若夏月宜用黃柏末敷之浴兒法三朝浴兒用五枝湯極妙五枝即桑枝桃枝槐枝榆枝柳枝也各取嫩技二三十節長三寸煎湯候冷熱得中入豬膽汁洗之不犯生水周歲內可免疱疥丹毒之患且避惡邪但北方生兒多不洗浴每以舊綿拭淨故兒多壯實若冬月嚴寒則不必洗若春月秋月不妨遲以十日半月擇晴和暖之日於無風房內浴之為妥而世俗不察無論天時但以三日為浴兒之期甚或以小兒體熱每遇澡浴即令久坐湯水之中以致風冷外傷水濕內滲變成風搐可不戒哉又嬰兒初生兩乳必有餅子須時常揉撮提捏以散為度若浴兒時即將兩乳頭各捏一把亦妙護兒法嬰兒初生肌膚未實衣服宜隨寒熱加減但令背腹常暖為佳春夏秋宜單衣不宜暖衣暖則筋骨軟弱易發瘡瘍冬月宜舊絮不宜新綿新則汗出表虛腠理不密易受風寒平日宜見地氣尤宜頻見風日若藏於重幃密室不見地氣風日則筋骨柔軟易致損傷嘗見富貴之子重茵疊被日在懷抱之中雖數歲未能行走時染災病而田舍之兒終日暴露或飢或寒絕無他病亦可知愛兒之不在姑息矣歌曰養子須調護看承莫縱馳乳多終損胃食壅即傷脾被厚非為益衣單正所宜無風須見日寒暑順天時真妙訣也又冬月嚴寒不與烘火惟以加衣厚暖可無火毒諸患又衣服被衲日曬日收不宜在外夜露書曰天上有飛星惡鳥不可干犯小兒染著戾氣生無辜疾啼叫不絕速宜換下即將衣服雨則醋炭烘之晴則太陽照之乳兒法乳兒不可太飽太飽則滿溢而成嘔吐若太飽以空乳吮之即消凡初乳須先捏去宿乳而後與之夏月不去熱乳令兒嘔逆冬月不去冷乳令兒咳嗽若夜間乳兒須以手臂枕之令乳與兒頭平則兒不噎母欲寐即奪其乳恐睡熟則不知飽足而成嘔吐也若母有妊乳兒必患胎黃母大醉乳兒必患驚熱母傷飽乳兒必患喘急母新房乳兒必患疳瘦母大怒乳兒必患癲狂母新吐乳兒必患虛羸又夏月甚熱母浴後即與兒乳令兒熱毒成痢必須熟揉良久方可乳兒又乳後不可與食食後不可與乳乳食相併則難克化結於胸中作痛大抵成癖成疳成積皆由於此若父母交合之時兒臥在旁驚醒啼哭不可即與乳吮蓋氣乳未定多致殺兒須靜片時然後與之又平日兒啼不可聞啼即抱即乳須常令乳哭則胎中所受熱毒由此而散胎中驚氣由此而解期月之間可免重舌木舌口噤胎風胎熱之患養兒訣嬰兒初生未剃胎髮不與戴帽則自幼至長難於傷風永無鼻塞拖涕之患又不得用油膩手繃裹春忌覆頭裹足夏忌飲冷食水冬忌火炙衣服至於飲食小兒氣血俱盛食物易消故食無時然腸胃尚脆而窄故小兒以乳為主三歲後方可食糕餅五歲外方可食葷腥則一生永無脾胃之疾若稠黏干硬一切魚肉水果濕面燒炙煨炒煎爆發熱難化之物皆宜禁絕婦人無知畏其啼哭無所不與積成痼疾雖悔何及語云惜兒須惜食吃熱莫吃冷吃軟莫吃硬吃少莫吃多真妙法也又夜臥不得令兒枕臂須作一小枕或綠豆或通草或燈心或菊花皆可裝入令兒枕之兼左右附之可近乳母之側切忌乳母鼻風吹兒囟門致成風病又覆衣衾須露兒頭面若一向仰臥恐成驚疾須時時回動之又小兒衣服須用七八十歲老人舊褲舊襖改作小兒衣衫真氣相滋令兒有壽且無疾病若富貴之家切不宜新制綾羅綢緞新綿皮襖之類與小兒披身若太溫暖則筋骨柔弱不惟易病抑且折福又懷抱小兒宜常著地氣使兒皮膚堅固又天氣和暖抱之使見風日則氣血堅剛可耐風寒又夜臥及懷抱皆忌豎頭易生驚風又養子十法須知一要背暖二要肚暖三要足暖四要頭涼五要心胸涼六要勿見怪物七脾胃常要溫八啼未定勿使飲乳九勿服輕粉硃砂十少洗浴人能行是數者何患嬰兒不登仁壽之門抱兒法嬰兒形骸雖具筋骨甚柔氣質未實如木之柔條軟梗可使或曲或直或俯或仰也故百日之內不可豎抱豎抱則易於受驚且必頭傾項軟有天柱倒側之虞半歲以前不可獨坐獨坐則風邪入背脊骨受傷有龜背傴僂之疾擇乳母法乳母宜節飲食飲食下咽乳汁便通情欲動中乳脈便應病氣到乳汁必凝滯兒得此乳疾病立至凡擇乳母須精神爽慧性情和悅肌肉充肥無諸疾病知寒溫之宜又能節飲食乳汁濃白則可以飼兒又乳母飲食不可食太酸鹹及頻飲酒然飲食之擇所繫猶小惟乳母稟受之厚薄性情之緩急骨相之堅脆德行之善惡兒能速肖所繫甚大宜謹擇之藏胎衣法胎衣以清水浴過又以清酒浴之入錢一文於衣內盛以新瓶青布裹口待滿一月之後擇天德月德天恩吉日於向陽高燥處掘地三尺埋之級堅築勿令有損俾兒康強不可忽略回氣法嬰兒初生氣欲絕不能啼必因難產或胃寒所致急用衣服包置懷中未可遽斷臍帶且將胞衣置炭火上烘之仍作大紙燃蘸麻油點火於臍帶下往來遍熏之令暖氣入腹內更以熱醋湯蕩洗臍帶須臾氣回啼哭如常方可斷臍帶或用蘄艾灸臍帶亦妙遍身無皮嬰兒初生遍身無皮但見紅筋紅肉此因母受胎以後久處高樓不沾地氣故也用純黃土研極細末納絹袋輕輕撲之一日三四次以皮生為度或用白糯米粉撲之亦可遍身水泡嬰兒初生遍身如魚泡狀似水晶碎則流水以密陀僧為末摻之足趾向後嬰兒初生兩足趾盡向後曲此因乳母有妊兩足患瘡不能行走日惟盤坐兒在母腹一氣相通形隨氣化故亦如是宜用軟綿卷棍子捆兒膝後彎內另煎木瓜湯常洗熨之日久筋長舒展則自能伸不啼嬰兒初生不啼因肛門有脂皮塞住不能出聲急用銀簪尖刺破作孔以油紙捻插入孔中不令再合即能出聲啼哭亦如常矣懸癰嬰兒初生不啼不乳奄奄如死者急看兒口中前齶上有泡如石榴子名曰懸癰宜以指抓破出血勿令嚥下急以絹拭淨惡血更用亂髮燒灰存性摻之即能通聲吞乳若惡血入喉必死馬牙嬰兒初生七日內面赤喘急啼聲不出口不飲乳名曰馬牙急看齒齦上有小泡如粟米狀以銀針挑破出血取桑樹內汁濾清塗之即瘥或用薄荷汁磨墨以青絹裹指蘸墨擦破勿飲乳一時許即愈鵝口白屑嬰兒初生百日內口中生白點無數拭之即去少傾復生口角流涎日夜啼哭不乳此胎熱也宜用甘草黃連等分煎湯以帛裹指拭去惡血取桑樹中白汁塗之或用白楊樹枝燒取瀝塗之立愈再以辰砂益元散燈心湯調下則不復作乳蕈嬰兒牙齦生白泡子名馬牙口中有肉高腫如菌名乳蕈皆致不能吃乳急以青帛裹指抓破出血拭淨輕者以京墨塗之重者宜用殭蠶三條炒人中白四分冰片少許研末擦之略停半時用絹蘸茶洗淨再擦一日三四次即愈若未愈再加硼砂血竭青黛各三分兒茶一分五釐藥珠一分各為細末和入前藥每日洗擦三四次無不愈者一方用馬齒莧根瓦上焙乾少加雄黃研末飲之重舌嬰兒舌根肉雍腫疊出短少如舌名曰重舌宜用苦竹瀝浸黃柏末點舌上即消如不效蒲黃末摻之木舌嬰兒舌尖腫大塞滿口中或僵硬如木不能轉掉名曰木舌宜用薄荷葉細茶葉共煎露一宿青絹裹箸上蘸藥抹上或用蓖麻子去殼取肉搗爛以紙捻蘸蓖麻油點火吹滅以煙燻之即消若舌下有如螻蛄或如臥蠶者急於腫突處砭去其血乃用釜底墨以鹽醋調敷或井華水調亦可或單用蒲黃研末刷上其腫自退弄舌嬰兒舌出掉動如蛇名曰弄舌蓋舌乃心苗心寧則舌靜心擾則舌亂心脾蘊熱故弄舌也輕者燈心煎湯服重者黃連煎湯頻頻與服夜啼嬰兒夜啼不止有寒熱驚滯四因寒則脾氣虛寒陰盛於夜故腹中作痛面青手冷曲腰而啼不思乳食宜鉤藤飲熱則心火煩躁臉紅便赤口熱腹暖仰身而啼見燈火則愈甚也宜生脈散見方後驚啼條中滯則過用乳食停滯作痛邪實無虛而腹拒按者宜消食丸若泄瀉不乳而啼者脾胃虛弱也宜六神散若吐瀉交作不乳而啼者脾胃虛寒也宜五君子煎若大便不化食少腹脹而啼者脾氣虛弱也宜五味異功散鉤藤飲鉤藤鉤茯神茯苓當歸川芎木香各一錢甘草五分上每服二錢薑棗為引水煎服若心經有熱面紅便赤者去木香加硃砂一錢木通湯下消食丸砂仁陳皮神麯炒麥芽炒三稜蓬朮各五錢香附炒一兩上為末麵糊丸麻子大白湯下量兒加減六神散人參白朮蜜炙山藥炒各五錢炙甘草二錢茯苓白扁豆炒各一兩上為末每服三錢薑棗水煎服五君子煎人參二錢白朮蜜炙茯苓各一錢炙甘草一錢乾薑炒一錢水一鍾半煎七分服五味異功散人參白朮蜜炙茯苓炙甘草陳皮各一錢薑棗為引水一鍾半煎七分服驚啼嬰兒肝氣未充膽氣最怯凡耳聞驟聲目視驟色雖非大驚卒恐亦能怖其神魂醒時受怖寐則驚啼或震動不寧或忽爾啼叫皆神怯不安之證治宜安神養氣為主宜獨參湯團參散若微煩熱者生脈散熱甚者導赤散獨參湯人參二兩水二鍾煎至八分溫服日服二次團參散人參當歸各等分同為末豬心一個切作三片上先取豬心一片煎湯調藥末二錢服或水煎亦可生脈散人參五錢麥冬去心五味子各三錢水煎服導赤散生地黃木通甘草各等分上加竹葉二十片水煎服一方加人參麥冬臍風嬰兒斷臍後宜用厚帛裹護若乳母不慎或因浴水入或兒尿浸濕或當風解視遂成臍風面赤喘急啼聲不出臍腫腹脹不能飲乳小腹必發青筋一道行至肚腹生兩丫義若行至心則不治矣急以艾葉一團灸其筋頭上並兩丫義盡處青筋消去便活若因水濕所傷臍腫濕爛宜用赤石脂枯白礬研極細末摻之若臍腫突出赤腫而痛或腫硬如盤宜用田螺三個搗爛入麝香少許調塗臍上須臾再易腫痛立消噤口口噤者又名噤口風其證眼閉口噤不能飲乳啼聲如鴉或舌上聚肉如粟米狀大小便皆通但口噤面赤多啼口不吐白沫與撮口異宜用天南星為末加冰片少許以指蘸薑汁抹藥塗擦牙齦立開或用牛黃以竹瀝調服一匙隨以豬乳滴於口中亦可口既開用白殭蠶略烘為末蜜調塗口內仍以艾灸臍或口中有白泡急宜擦破去其毒火桑樹白汁塗之撮口撮口者唇撮聚而不開面目青黃啼聲不出氣自喘急口吐白沫宜用紫蘇前胡殭蠶各五錢水煎頻服以口開為度開後切弗即令吮乳或用生地黃生薑蔥白蘿蔔子田螺肉共搗爛攤貼臍上四周一指厚用帛束住下屁泄而愈感冒嬰兒氣血未充腠理不密最易感冒風寒若初覺發熱不必服藥但於其熟睡之時夏以單被冬以棉被矇頭松蓋勿雍其鼻但以稍暖為度使其鼻息出入皆此暖氣少傾則微汗津津務令上下稍透則表裡通達而熱自退矣若寒無衣被冷冽汗不易得則輕摟貼體而上覆其面則無有不出汗者此至妙之法也若寒邪甚者兩三微汗之無有不愈者此法行於寅卯時則汗易出而效尤速但汗後尤易招風更宜小心遮護不可以其汗而忽之也又嬰兒受風鼻塞不能吮乳體弱不宜發散者惟用大天南星為末生薑自然汁調成膏貼於囟門即愈或以草烏皂莢為末蔥汁搗膏貼於囟門亦妙吐乳嬰兒受寒吐瀉若不早治必成慢驚宜用小丁香陳皮各五分水煎服或用白豆蔻砂仁各七粒生甘草炙甘草各一錢為末常摻入兒口中即止若吐乳直出不停留者宜用炒麥芽二錢橘紅一錢丁香三分水煎服吐嘔不乳嬰兒初生嘔吐不乳乃穢惡入口熱乘於心心得熱而散流於胃濕熱相搏故作嘔吐也宜用黃連枳殼赤茯苓等分為末蜜丸梧子大乳汁調化一丸灌入即止或用木瓜生薑等分水煎服亦妙眼閉嬰兒初生月內或月外兩目紅赤澀閉腫爛不開以蚯蚓泥搗塗囟門干則再換不過三次即愈或用生南星生大黃等分為末醋調塗兩足心亦妙口角流涎涎自口角流出而滯於頤間名曰滯頤此由脾冷涎多脾虛不能攝津水為涎甚則溢出漬滯頤間顯淫紅赤宜用白朮土炒焦陳皮青皮炮姜各五分半夏制丁香木香各一錢為末麵糊丸如黍米大一歲服十丸米湯下亦有脾熱而然者宜用白朮蜜炙滑石水飛各五分白扁豆炒茯苓石斛各三分黃連三分葛根一分半甘草一分為末燈心湯調下每服一錢赤遊丹毒嬰兒初生遍身發丹毒赤腫遊走不定此由妊母嗜食熱物血熱流胎毒蘊腠理或烘曬熱衣即與包裹柔嫩肌膚感受熱毒所致也宜用細針隨血暈周圍刺出惡血最妙仍用芭蕉根搗汁塗之冬月畏冷隔水燉溫可也或用蠐螬蟲搗汁塗之或用溝渠中小蝦搗爛塗之若用寒涼塗之不效者用伏龍肝即灶心土研末雞子清調敷若遍身壯熱不安宜用荊芥穗防風黃芩各一錢犀角鎊末甘草各五分牛蒡子微炒四錢水煎時時與服即愈若患丹瘤宜用蓖麻子五粒去殼研末入面一匙水調塗之蝦蟆瘟嬰兒胸腹光亮色如水晶臟腑俱見名曰蝦蟆瘟用大蝦蟆六支將四足紮起以蝦蟆肚皮安放水晶色處撫摩幾次置於小兒臍上再用第二支亦如前法更換六支其病自愈但蝦蟆眼內有酥射人宜以絹遮其眼用畢宜放之胎黃嬰兒初生遍身金黃此母受熱而傳胎也若身熱便閉口不飲乳啼哭不止宜用生地黃當歸天花粉白芍川芎各一錢水煎母子同服一方無白芍川芎當歸有茵陳胎赤嬰兒初生月內遍身紅赤肌若塗丹此中熱毒也內服生地黃天花粉連翹去心甘草各一錢外用藍葉浮萍水苔搗爛絞汁調朴硝土炒研塗之胎青嬰兒初生面色或白或青此胎中受寒也生下感風四肢厥冷大便青黑腹作盤腸疼痛宜用當歸黃耆蜜炙細辛黃芩龍骨煅研桂心白芍各等分為末每服一錢以乳調服三服加減走馬牙疳嬰兒牙床腐爛若一二歲已出牙者甚至牙齒脫落名為走馬言其急也此熱毒蘊結而然凡病此者大為凶證宜用綠豆煎濃汁頻服使毒從小便出外用人中白四分銅綠醋製杏仁各二分冰片少許為細末敷患處舌瘡嬰兒口舌生瘡飲乳不得宜用白礬研末和雞子清入醋少許調勻塗兒足心二七日愈腮腫嬰兒兩腮腫硬有核或在一邊名曰痄腮用五倍子一個濕紙包煨燒灰存性研末雞子清調敷或用蜒蚰一條銀米一錢同搗爛塗之亦可熱瘡嬰兒體陽多患熱瘡用雞子五枚煮熟去白取黃亂髮如雞子大一團和勻安鐵銚內炭火熬之初甚熱少傾即發焦乃有液出旋取置碗中以液盡為度取塗瘡上即以苦參研末敷之禿瘡嬰兒頭患禿瘡用鴿子屎新瓦上焙存性研末麻油調搽三次即愈如瘡靨堆起先用清米泔水同蔥白川椒煎湯洗去再搽無不驗者龜背龜背乃初生時不能護背風入脊骨或令坐太早亦致傴僂背高如龜多成痼疾宜松蕊丹松蕊丹松花粉枳殼麩炒防風獨活各一兩麻黃去節大黃前胡桂心各五錢上為末蜜丸黍米大米飲下十丸龜胸龜胸乃肺熱脹滿攻於胸膈而成多由乳母過食五辛熱物及酒面過度或夏月常飲熱乳所致宜百合丹百合丹大黃七錢五分天冬去心杏仁去皮尖百合木通桑白皮枳殼麩炒甜葶藶石膏各五錢為末蜜丸綠豆大白湯下五七丸外腎縮入嬰兒初生外腎縮入啼哭不止者此胎中受寒寒則收入也用硫黃吳茱萸各五錢為末大蒜汁調塗臍腹上仍以蛇床子燒煙微微熏之即出陰囊光腫嬰兒陰囊腫大墜下不收宜用紫蘇葉為末敷患處濕則乾摻干則香油調塗雖皮潰而核欲墜者亦愈二便不通嬰兒大小便不通腹脹欲絕者急令人溫湯漱口吸咂兒之前後心臍心兩足心共七處每處吸咂五七口取紅色氣透為度氣透則便自通不爾則死小便不通嬰兒初生六七日不飲乳不小便用蔥白一寸分作四片乳汁半鍾同煎片時取乳分四次服即通胎疝嬰兒初生髮疝只見啼哭不見病形延至一周兩歲始知是疝諸醫不效宜用麻瀝樹上鴛鴦果一對其果連樹枝取下可辨真假一對果可治三人荔枝核七枚杵碎煨平地木三錢水煎服即瘥亦不復發木疝嬰兒初生其卵甚大日久長成恐變木疝俟過滿一月後端午日午時以腳盆盛熱水安於中堂隨抱小兒將卵放水內一浸再將小兒抱到中門檻上中間輕輕一擱令卵上之水印痕於檻將艾葉一團安在檻上濕痕處灸三壯其卵遂漸收小如常用之神效肛腫嬰兒腸胃濕熱下注則肛門暴腫宜用田螺數個搗爛塗之即消解顱嬰兒頭縫不合狀如開解名曰解顱此腎氣不成也蓋腎主骨髓而腦為髓海腎氣不成則腦髓不足故不合也宜內服六味地黃丸方見後腳軟條中外貼三神散三神散乾薑七錢五分炮細辛桂心各五錢上為末薑汁調敷囟上以頭巾裹護之小兒面赤即合囟陷嬰兒囟門成坑名曰囟陷此因臟腑中有熱煩渴引飲致成泄瀉則氣血虛弱不能上交腦髓故囟陷如坑不得平滿宜用黃狗頭骨炙黃為末雞子清調敷發不生嬰兒發不生者因稟受氣血不足不能榮於發也宜用當歸乾地黃肉蓯蓉白芍各一兩胡粉五錢共為末蜜丸黍米大黑豆湯下十丸外用二三十丸磨化塗擦頭上即生齒不生嬰兒齒不生者由齒為骨之所終髓之所養稟氣不足則髓不能充故齒久不生宜用川芎乾地黃當歸山藥白芍各一兩沉香五錢甘草三錢為末白湯調下五分外用藥末乾摻齒齦上手指擦之日二次頭項軟嬰兒頭項軟乃天柱骨倒也宜用白殭蠶去頭足毛炒為末每服五分薄荷湯調下日三服外用木鱉子三個蓖麻子三十粒俱去殼研勻先抱起兒頭摩項上令熱貼之口軟嬰兒口軟不能言乃兒在胎中母有驚懼驚氣入心包絡使兒心神不定舌本不通宜用石菖蒲人參麥冬去心遠志制川芎當歸各二錢乳香去油辰砂水飛各一錢為末蜜丸麻子大米飲下十丸日三服若三歲不能言宜六味地黃丸方見後腳軟條中加鹿茸五味子丸服手軟嬰兒手軟乃手中無力不能掉動也宜用薏苡仁當歸秦艽酸棗仁防風羌活各五錢為末蜜丸芡實大荊芥湯化下腳軟嬰兒腳軟難行乃氣血不充骨髓不滿或肝腎俱虛肝主筋腎主骨筋弱不能束骨宜六味地黃丸加鹿茸牛膝五味子五加皮久久服之或虎骨丸亦佳六味地黃丸熟地黃八兩山茱萸去核山藥各四兩丹皮茯苓澤瀉各三兩蜜丸梧子大空心白湯下虎骨丸乾地黃熟地黃虎脛骨酸棗仁茯苓肉桂防風當歸川芎牛膝黃耆蜜炙上各等分為末蜜丸麻子大木瓜湯下五丸斷乳法小兒二三歲時欲斷乳宜用畫眉膏候兒熟睡時將膏濃抹畫兒兩眉上醒來自不吃乳未效再塗仍用墨搽頭必效凡斷乳忌逢五七日宜用卯日及伏斷日畫眉膏山梔仁炒黑三枚雄黃硃砂輕粉各少許上為細末麻油調勻畫之鬾病婦人先有小兒未能行走而母復有胎妊使兒飲此乳則作鬾病令兒黃瘦骨立精神不爽身體痿瘁宜用伏翼即蝙幅燒灰研細米飲調下五分日四五次急令斷乳隨制交泰丹神機丹相間服之以轉生機交泰丹乾地黃二兩山茱萸去核油炒淮山藥各一兩牡丹皮酒洗遠志肉甘草湯泡澤瀉酒浸一宿曬乾石菖蒲桑枝拌蒸茯神蒸各七錢五分龍骨煅酒淬水飛龜板酒浸炙各五錢上為極細末月內小兒服一分逐月加一分周歲服一錢二分二歲服一錢五分三歲服二錢五歲以後服三錢俱以開水調下與神機丹間服神機丹黃耆蜜炙二兩白朮蜜炙三兩茯苓白扁豆炒建蓮肉去心薏苡仁炒山楂肉各一兩炙甘草六錢廣陳皮六分石菖蒲九節去毛桑枝拌蒸一兩六錢上為極細末白湯調下分量與交泰丹同遞加增繼病母有妊乳兒致兒有病如瘧痢他日生兒亦相繼腹大或發或瘥宜用百勞鳥毛一名鵙即博勞鳥也帶之或以紅紗袋入夜明砂即蝙蝠屎於內與兒佩之
