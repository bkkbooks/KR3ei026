body:
  text: 卷四求嗣上求嗣總論生人之道始於求嗣而求嗣之法不越乎男養精女養血兩大關鍵蓋陽精溢瀉而不竭陰血時下而無愆陰陽交暢精血合凝胚胎結而生育滋矣若陽虛不能下施於陰陰虧不能上承夫陽陰陽牴牾精血乖離是以無子主治之法男當益其精而節其欲使陽道之常健女當養其血而平其氣使月事以時下交相培養有子之道也世人不察方且推生克於五行蘄補養於藥餌以偽勝真以人奪天雖孕而不育育而不壽者多矣求嗣脈訣求嗣之脈專責於尺右尺偏旺火動好色左尺偏旺陰虛非福惟沉滑勻易為生息微澀精清兼遲冷極若見微濡入房無力女不好生亦尺脈澀相女有法求嗣者必先擇女猶種植者必先擇地蓋砂礫之場難期稻黍而薄福之婦安望熊羆故為後嗣計不可不選擇也大都婦人之質貴靜而賤動貴重而賤輕貴厚而賤薄貴蒼而賤嫩故唇短嘴小者不堪此子嗣之部位也耳小輪薄者不堪此腎氣之外候也聲細而不振者不堪此丹田之氣本也形體薄弱者不堪此藏蓄之宮城也飲食纖細者不堪此倉廩血海之源也發焦齒豁者不堪肝虧血而腎虧精也晴露臀削者不堪臟不藏而後無後也山根唇口多青氣者不堪陽不勝陰必多肝脾之滯逆也脈見緊張弦澀者不堪必真陰虧弱經候不調而乏生生之氣也他如未笄之女陰氣未完欲盛之婦所生多女性情和者調經自易性情妒者月水不勻相貌惡者形重顏容美者福薄肉肥勝骨者脂滿子宮骨瘦如柴者子宮無血又有虎頭熊項蜂目豺聲橫面豎眉者必多刑剋潑悍奸險陰惡刻薄者均不利於子嗣求嗣者不可不急講也子嗣專責男子子嗣有無之責全歸男子而世俗專主婦人此不通之論也易曰坤道其順乎承天而時行夫地之生物不過順承乎天則母之生子亦不過順承乎父而已安可以婦人為主耶若以婦人為主試觀富貴之家侍妾已多其中豈無經水當期而無病者乎有已經前夫頻頻生育而娶以圖其易者顧亦不能得胎更遣與他人轉盼生子者豈不能受孕於此而能受孕於彼乎是以子嗣之有無責專男子無論老少強弱俱要神足神足全憑寡欲寡欲則不妄交合積氣儲精待時而動一舉而成世人不察以小產專責之母不育專付之兒壽夭專誘之數不亦謬乎蓋少年生子多有羸弱者欲勤而精薄也老年生子反多強壯者欲少而精全也又交接時不可大肆出入密密揉之可也若大肆出入胎風自不能免矣故年老人得子多不受風者不能大肆出入故也又受胎後切不可再與之交一恐傷胎暗產一恐生子胎毒為患也是男子必先自治而後及婦人則幾矣求嗣必先養精種子之法男子必先養精女子必先養血今人之無子者往往勤於色欲豈知施泄無度陽精必薄縱欲適情真氣乃傷妄欲得子豈能孕乎夫男主乎施女主乎受一施一受胎孕乃成今所施者全非先天濃郁之氣不過後天渣滓之物縱使陰受可化而實乏陽施之用矣故求嗣者毋傷于思慮毋耗其心神毋意馳於外而內虛毋志傷於內而外駁毋以酒為色媒毋以藥而助火清心寡慾安神惜精靜養日久氣足神完依時而動其一點先天之真精生氣勃然隨陽之痿而溢出自萬舉而萬當矣內經云陰平陽秘精神乃治陰陽離決精氣乃絕老子曰必清必靜毋搖爾精人鏡經曰精氣盛則生二男益謂此也養精須寡欲種子之法古人言之不少如廣嗣訣以經期方止子宮正開宜及時布種道藏經以月信止後單日屬陽成男偶日屬陰成女李東垣以經斷一二日感者成男四五日感者成女朱丹溪以受氣於左子宮為男受氣於右子宮為女聖濟經以左動成男右動成女褚氏遺書以血裹精成男精裹血成女諸說紛紛各成其是而終無十全之效所謂效獲十全者寡欲是也寡欲則不妄交合聚精會神待時而動亦何求而不得歟然寡欲必先清心心主血而藏神心有所動神即外馳外雖未泄精已離宮即腎氣亦隨之而內亂輕則夢遺淋濁重則楊梅結毒即幸而獲免其於交會之際毫無靜一清寧之真氣所泄之物盡是腐濁而已安能化育成胎哉心為一身之主誠能掃盡邪思兼用靜工存養無令火動俟陽精充實依時而合一舉而成是以寡欲則神完不惟多子抑亦多壽養精須節勞夫精成於血不獨房勞損吾之精凡日用事物之間其傷吾精者甚多如目勞於視則血以視耗耳勞於聽則血以聽耗心勞于思則血以思耗吾隨事而節之則血得其養而與日俱積矣養精須息怒腎主閉藏肝主疏泄二臟皆有相火而其繫上屬於心心君火也怒則傷肝而相火動動則疏泄者用事而閉藏者不得其職雖不交合亦暗流而潛耗矣養精須戒酒飲食之類人之臟腑各有所宜似不必過為拘執惟酒為不宜蓋胎種先天之氣極宜清楚極宜充實而酒性淫熱非惟亂性亦且亂精精為酒亂則濕熱其半真精其半耳精不充實則胎元不固精多濕熱則他日痘疹驚風脾敗之患率已基於此矣故求嗣者必嚴戒之與其多飲不如少飲與其少飲尤不如不飲此胎元之大機也若醉後入房精蕩而隨薄矣養精須慎味經曰精不足者補之以味然肥濃之味不能生精惟淡泊之味乃能補精耳夫萬物皆有真味調和勝則真味失不論葷素蒸煮得法自有一種沖和恬淡之氣食之自能養精蓋食物甚多惟五穀為得五味之正故煮粥飯熟後上面有厚汁融成一團者皆米之精液所聚也食之驟能生精試之有效人能行是數者非特為求嗣之良方亦可為攝生之妙術矣煉精之法煉精全在腎家下手內腎一竅名元關外腎一竅名牝戶真精未泄乾體未破則外腎陽氣至子時而興人身之氣與天地之氣相應精泄體破而人身陽生之候漸遲有遲至醜遲至寅且有遲至卯而始生者更有終不生者始與天地不應矣煉之之訣須於夜半子時披衣起坐兩手搓極熱一手將外腎兜住一手掩臍心而凝神於內腎久久行之而精旺矣君相二火須知君火在心心其君主也相火在腎腎其根本也然二火相因無聲不應故心宜靜不靜則火由欲動而自心挑腎先心後腎者以陽爍陰出乎勉強勉強則氣降而丹田失守已失元陽之大本腎宜足腎足則陽從地起而由腎及心先腎後心者以水濟火本乎自然自然則氣升而百脈齊到斯誠化育之真機故輕薄之夫每從勉強故多犯虛勞不利子嗣忠厚之士常由自然故品物咸享何患後人求嗣者亦務陽道之真機則得矣男女情興男女和悅彼此情動而後行之則陽施陰受而胚胎成是以有子若男情已至而女心未動則玉體才交瓊漿先吐陽精雖施而陰不受矣若女情已至而男志或異則桃浪徒翻玉露未滴陰血雖開而陽無入矣陰陽乖離成天地不交之否如之何能生萬物哉種子時候天地生物必有絪縕之時萬物化生必有樂育之候貓犬至微將受孕也其雌必狂呼而奔跳以絪縕樂育之氣觸之而不能自止耳此天地之節候生化之真機也婦人於經盡之候必有一日子宮內挺出蓮花蕊子氣蒸而熱神昏而悶有欲交接不可忍之狀此受精結胎之候也於此時逆而取之則成丹順而取之則成胎但婦人每含羞不肯言耳男子須預告之令其自言則一舉即中矣進火妙訣玉湖須淺泛淺則女美重載卻成憂深則女傷陰血先參聚女血先來陽精向後流男精後至紅花含玉露血裹精則生男平步到瀛洲直上成胎男有三至男女未交之時男有三至者謂陽道奮昂而振者肝氣至也壯大而熱者心氣至也堅勁而久者腎氣至也三至俱足女心之所悅也若痿而不舉肝氣未至也肝氣未至而強合則傷其筋其精流滴而不射矣壯而不熱者心氣未至也心氣未至而強合則傷其血其精清冷而不暖矣堅而不久者腎氣未至也腎氣未至而強合則傷其骨其精不出雖出亦少矣求嗣者所貴寡欲清心以養肝心腎之氣也女有五至男女未交之時女有五至者面上赤起眉靨乍生心氣至也眼光涎瀝斜視送情肝氣至也低頭不語鼻中涕出肺氣至也交頸相偎其身自動脾氣至也玉戶開張瓊漿浸潤腎氣至也五氣俱至男子方與之合而行九淺一深之法則情洽意美無不成胎矣女有五傷交合之時女有五傷一陰戶尚閉不開不可強刺刺則傷肺二女興已動男或不從興過始交則傷心致經不調三以少陰而遇老陽玉莖不堅舉而易軟女情不暢則傷肝必至盲目四經水未盡男強逼合則傷腎五男子酒醉交戰莖物堅硬久刺不止女情已過陽興不休則傷腹五傷之候安得有子女有五候嬌吟低語心也合目不開肝也咽乾氣喘肺也兩足或屈或伸仰臥如死脾也口鼻氣冷陰戶瀝出黏帶腎也五者快美之極男子識其情而採之不獨有子且有補助之益遲速異勢陰陽情質稟有不齊精固者常遲精不固者常速遲者嫌速則猶飢待食及咽不能速者畏遲則猶醉添杯欲吐不得遲速不侔何以成胎故以遲遇速宜出奇由徑勿逞先聲以速遇遲宜靜以自持挑而後戰則適逢其會矣強弱殊情陽強陰弱則畏如峰蠆避如戈矛陽弱陰強則聞而風靡望塵而北強弱相凌而勢不能敵何以受孕然撫弱有道必居仁由義務得其心克強固難非聚精會神安奪其魄誠得此法以治之則強不足畏弱不足慮矣童稚不孕方苞方萼生氣未舒甫童甫笄天癸未裕曾見有未實之粒可為種未足之蠶可為繭乎強費心力即日姑俟異日而年衰者其能待乎是坐失其時而已矣交合避忌男女交合古法當避丙丁日及弦晦望日然為艱嗣者計似可不拘若大風大雨大雷大霧產寒酷暑以及天地晦冥日月薄蝕虹霓地震之際此天地之震怒四時不正之氣犯則損男百倍令女得病縱然有子亦必癲癡頑愚喑啞聾瞶攣跛盲眇多病短壽不孝不仁此其宜避忌者一也又日月星光之下神廟侍寺之中井灶圊廁之側塚墓屍柩之傍以及沉陰危險之地皆不可犯此其宜避忌者又一也夫交合知避則有福德大智善人降宅胎中仍令性行和順家道日隆非惟少疾亦必聰明俊秀而多壽若不避忌則愚癡奸詭惡人來宅胎中仍令性行凶險家道日消非惟殘疾亦必飛災橫禍而夭枉禍福之應驗如影響可不慎歟暗產須防胎元初成形如珠露此其橐龠無依根荄無地鞏之則固決之則流故凡受胎之後極宜節欲以防泛溢而少年縱情罔知忌憚往往恃強而不敗或既敗而復戰當此之時主方欲靜客不肯休無奈狂徒敲門撞戶顧彼水性熱腸有不啟扉而從隨流而逝者乎斯時也落花與粉蝶齊飛火棗共交梨並逸合汙同流已莫知其昨日孕而今日墮矣朔日孕而望日墮矣隨孕隨墮本無形跡蓋明產胎已成形小產必覺而暗成胎仍似水直溜何知故䘕術家多無大產以小產之多也娶娼妓者多無子息以其子宮滑而慣於小產也余嘗見世之艱嗣者問其陽事則曰能戰問其功夫則曰盡通問其意況則怨嘆曰人皆有子我獨無夫豈知人之明產而己之暗產耶此外如受胎三五七月而每有墮者雖衰弱之婦多有之然必由縱欲不節致傷母氣而墮者為尤多也故凡恃強過勇者多無子以強弱之自相殘也縱肆不節者多不育以盜損胎元之氣也豈悉由婦人之罪哉求嗣者思患而預防之則庶乎其可矣蓄妾之法無故置妾大非美事凡諸敗壞無不由之若年老妻衰無後為大則勢有不得無置者然置之易而蓄之難則蓄之貴得其法也一則蓄之不可過嚴蓋主母見妾大都非所樂從是以或多嗔怒或多罵詈或因事責其起居或假借加以聲色是皆常情之所必至者而不知產育由於氣血氣血由於情懷情懷不暢則衝任受傷衝任受傷則胎孕不受故蓄之不可過嚴也一則妾室宜靜宜遠宜少近耳目者為妙蓋私構之傾男子宜銳女子宜受一銳一受皆由於氣當此之時專則氣聚而直前是以宜子怯氣餒而不攝何以成胎然勇怯之由其權在心心之所致氣亦至焉心有疑懼則心不至氣即不至矣倘臨期驚有所聞則氣在耳而不及器矣疑有所見則氣在目而不及器矣或忿或畏則氣結在心而不至器矣氣有不至則如石投水而水則無知也且兩陣交鋒最嫌奸細之偵伺一心無二何堪讒間以相離此妾室所以貴乎靜且遠也然此二法亦不過為錦囊無奈者設耳倘有高明賢淑惟宗祧之是慮不惟不妬而且相憐則愈近愈慰而遠之之說豈近人情苟其不然則雖有蓄之之名而終無蓄之之實雖置妾有何益哉種子藥食宜慎種子之方本無定軌因人而藥各有所宜寒者宜溫熱者宜涼滑者宜澀虛者宜補去其所偏則陰陽和而生化著是即種子之奇方也今人不知此理而但知傳方豈宜於彼者亦宜於此耶且或見一人偶中而不論己之宜否而偏聽如神競相制服一若張冠李可戴也況所傳種子之方大抵興陽壯熱之品居多甚至煅煉金石及製取毒穢悍劣諸物炫詭矜奇但助房中之樂不顧喪身之禍求嗣者所宜慎也男子艱嗣病源疾病之關於胎孕者男子則在精女子則在血無非不足而然凡男子之不足則有精滑精清精冷或臨事不堅或流而不射或夢遺頻數或便濁淋澀或好女色以致陰虛陰虛則腰腎痛憊或好男風以致陽極陽極則亢而亡陰或過於強固強固則勝敗不洽或素患陰疝陰疝則肝腎乖離此外或以陽衰陽衰則多寒或以陰虛陰虛則多熱是皆男子之病不得盡諉之婦人也倘得其源而醫治之則事無不濟矣婦人不孕病源婦人所重在血血能構精胎孕乃成欲察其病惟於經候見之欲治其病惟於陰分調之蓋經即血也血即陰也陰以應月故月月如期此其常也及其為病則有或先或後者有一月兩至者有兩月一至者有枯絕不通者有頻來不止者有先痛而後行者有先行而後痛者有淡色紫色黑色者有瘀而為條為片者有精血不充而化作帶濁者有元氣下陷而變為崩漏者有子宮虛冷而陽氣不能生化者有血中伏熱而陰氣不能凝成者有血癥氣瘕子臟不收月水不通者皆真陰之病也主治之法詳載調經上下兩卷夫真陰既病則陰血不足者不能育胎陰氣不足者不能攝胎攝育之權總在命門以命門為衝任之血海而胎以血為主血不能自生而又以氣為主是皆真陰之謂也故凡補命門或氣或血皆可謂之補陰而補陰之法即培根固本之道也凡自壯至老乃人人之所不可缺者而況為先天后天之肇基舍是無以用其力矣是以調經種子之法亦惟以填補命門顧惜陽氣為主然精血之都在命門而精血之源又在二陽心脾之間蓋心主血養心則養血脾胃主飲食健脾胃則氣布二者胥和則氣暢血行此情志飲食又當先經血而為之計者無非補陰之源也使不知本末先後面妄為之治則烏足以言調經種子之法種子誤治辨明陽精之施陰血能攝精成其子血成其胞胎孕乃成今婦人無子皆由血少不能射精血少固非一端然必調補陰血使無虧欠乃可成胎俗醫不察悉謂子宮虛冷投以辛熱之藥煎熬臟腑血氣沸騰經來必轉紫黑漸成衰少始則飲食驟進久則口苦而干諸證蜂起焉能成胎縱然生子亦多不壽男子陰虛艱嗣男子真陰不足不能滋養營衛漸至衰弱或虛熱往來自汗盜汗或神不守舍血不歸原或虛損傷陰或遺淋不禁或氣虛昏暈或眼花耳聾或口燥舌乾或腰痠腿軟凡精髓內虧津液枯涸等證均宜速補左腎之真陰宜左歸丸左歸丸熟地黃八兩搗膏山藥薑汁炒枸杞子山茱萸去核鹿膠炒珠龜膠炒珠菟絲於制各四兩川牛膝酒蒸克上為末蜜丸桐子大食前淡鹽湯送下百丸若真陰失守虛火炎上者宜用純陰至靜之品去枸杞鹿膠加女貞子麥冬各三兩火爍肺金乾枯多嗽者加百合三兩夜熱骨蒸加地骨皮三兩小水不利不清加茯苓三兩大便燥結去菟絲子加肉蓯蓉三兩氣虛加人參四兩血虛微滯加當歸四兩腰膝痠痛加杜仲鹽水炒三兩臟平無火而腎氣不充者去龜膠加破故紙三兩蓮肉去心胡桃肉各四兩男子精少艱嗣精少者雖能射入而精必衰薄蓋胞胎之口大張而些少之入何能饜足勢必隨入而隨出矣宜固本丸固本丸菟絲子酒製熟地黃酒蒸搗乾地熟酒浸搗天門冬去心酒浸麥門冬去心酒浸五味子茯神各四兩淮山藥微炒三兩蓮肉去皮心人參去蘆枸杞子各二兩上為末蜜丸梧子大每服八九十丸淡鹽湯下男子瘦弱艱嗣男於諸虛百損肌肉消瘦耳聾目暗宜無比山藥丸無比山藥丸山藥二兩菟絲子三兩酒浸五味揀六兩肉蓯蓉四兩酒浸杜仲酒炒三兩牛膝酒浸蒸熟地黃澤瀉山茱萸茯苓巴戟肉赤石脂各一兩上為末蜜丸每服五十丸食前米飲下男子精薄艱嗣男子嗜欲不節施泄太多以致腎虛精薄不能直射子宮宜夢熊丸夢熊丸黃耆蜜炙四兩黃魚鰾膠蛤粉炒珠一斤沙苑蒺藜八兩馬乳浸蒸熟焙上為末蜜丸每服八十丸空心溫酒下男子精滑艱嗣男子精氣不固或夢遺頻數或便濁淋漓遺泄太多是以無子宜種子丹種子丹蓮鬚揀金色者四兩山茱萸去核三兩覆盆子二兩去蒂龍骨煅水飛五錢芡實米四兩沙苑蒺藜取淨末四兩再篩極細末二兩入藥仍有粗末用水熬膏上為末熟蜜四兩和蒺藜膏為丸空心淡鹽湯下男子精清艱嗣男子精氣清冷或房勞過傷以致腎水欠旺不能直射子宮宜固本健陽丹固本健陽丹熟地黃山茱萸各三兩巴戟肉二兩菟絲子揀淨川續斷酒浸遠志肉制蛇床子炒各兩半茯神山藥酒蒸牛膝酒洗杜仲酒炒斷絲當歸身酒洗肉蓯蓉酒浸五味子益智仁鹽水炒鹿茸酥炙各一兩枸杞子三兩人參二兩上為末蜜丸梧子大空心淡鹽湯下臨臥再服男子精冷艱嗣男子陽旺