body:
  text: 跋蕭山竹林寺僧以專治婦科名於浙東西余家距寺不及百里求其方書從未之見道光庚戌妹壻張君春棠貽佘此書按方試用效輒立見問所自來云得之旌德薦紳家尚自留其一也顧作者姓名不傳歷詢醫士亦無能道之者或謂書名竹林意即寺僧之祕傳與余韙其言藏之篋衍咸豐辛酉粵匪陷吾郡是編與他書籍同淪劫灰流離轉徙間無此恆覺不便同治間重遊皖水遍求之而不得問旌德汪氏原刻亦遭兵火無片版存矣光緒辛巳假春棠藏板謀付剞劂而絀於力爰於賓幕餘間手抄成帙而以原本歸之戚好知有抄帙展轉借閲或謂神效昭昭治閨闈之弱質而逮襁褓之幼嬰大有濟於世也大有濟於世可不刊而公諸世與執此以念同志莫不樂於成先是陳君又笙函示黑神丹方稱為保産聖藥又笙精研醫家書善療疾名譽溢於吾郡余服膺其說物色佳品陳墨寄請依法虔制旋承分饋投無不驗嘗救一婦於産難垂危群醫束手之際益歡聖藥之說信而有徵足補是書之所未備適手民工蕆用附刻於保産一冊之後以廣流傳周君春帆方君滌儕陳君星甫魯瞻朱君芴棠章君干臣許君伯若楊君子壽談君夢白黃君幼堂沈君舜卿步周葆卿徐君子英陳君佩生楊君云階皆醵資以助者也頗君楞青則於鋟板之役始終襄事者也張君意溟吳君子堅分任校勘者也備書簡末以明積年隱願一旦獲償賴於友聲之相應者抑亦多已光緒辛卯六月山陰侖青照肖如跋於皖江節署
